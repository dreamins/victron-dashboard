<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solar Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
/* ── Dark theme (default) ─────────────────────────────────────────────── */
:root {
  --bg:          #05070a;
  --bg-grad:     radial-gradient(circle at 50% -20%, #1e1b4b 0%, #05070a 70%);
  --flow-grad:   radial-gradient(circle at center, rgba(30,58,138,0.12) 0%, transparent 100%);
  --surf-1:      rgba(17,24,39,0.70);
  --surf-2:      rgba(31,41,55,0.50);
  --border:      rgba(255,255,255,0.08);
  --text:        #f3f4f6;
  --sub:         #9ca3af;
  --dim:         #4b5563;
  --hdr-bg:      rgba(5,7,10,0.85);
  --node-fill:   #0f172a;
  --node-stroke: rgba(255,255,255,0.08);
  --node-label:  #9ca3af;
  --node-val:    #ffffff;
  --chart-grid:  rgba(255,255,255,0.04);
  --chart-tick:  #6b7280;
  --chart-leg:   #9ca3af;
  --solar:  #ffcc33;
  --batt:   #00f2ff;
  --charge: #10b981;
  --red:    #ef4444;
  --amber:  #f59e0b;
  --hh: 64px;
}
/* ── Light theme ──────────────────────────────────────────────────────── */
body.light {
  --bg:          #f0f4f8;
  --bg-grad:     radial-gradient(circle at 50% -20%, #bfdbfe 0%, #f0f4f8 70%);
  --flow-grad:   radial-gradient(circle at center, rgba(219,234,254,0.4) 0%, transparent 100%);
  --surf-1:      rgba(255,255,255,0.85);
  --surf-2:      rgba(241,245,249,0.90);
  --border:      rgba(0,0,0,0.09);
  --text:        #0f172a;
  --sub:         #64748b;
  --dim:         #94a3b8;
  --batt:        #0891b2;
  --charge:      #059669;
  --hdr-bg:      rgba(248,250,252,0.90);
  --node-fill:   #ffffff;
  --node-stroke: rgba(0,0,0,0.10);
  --node-label:  #64748b;
  --node-val:    #1e293b;
  --chart-grid:  rgba(0,0,0,0.06);
  --chart-tick:  #94a3b8;
  --chart-leg:   #64748b;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { height:100%; }
body {
  height:100%; display:flex; flex-direction:column; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; line-height:1.6;
  transition: background 0.3s, color 0.3s;
}
body::before {
  content:''; position:fixed; inset:0; z-index:-1;
  background: var(--bg-grad);
  transition: background 0.3s;
}

/* ── Header ──────────────────────────────────────────────────────────── */
header {
  flex-shrink:0; height:var(--hh);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
  background:var(--hdr-bg); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); z-index:50;
}
.logo { display:flex; align-items:center; gap:12px; font-size:18px; font-weight:800; letter-spacing:-0.5px; }
.logo-icon {
  width:36px; height:36px; border-radius:10px;
  background:linear-gradient(135deg,#ffcc33,#f97316);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; box-shadow:0 0 20px rgba(251,191,36,0.3);
}
.hdr-right { display:flex; align-items:center; gap:16px; }
#status-pills { display:flex; align-items:center; gap:12px; }
.s-pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--sub); }
.s-dot  { width:8px; height:8px; border-radius:50%; }
.s-dot.on  { background:var(--charge); box-shadow:0 0 10px var(--charge); }
.s-dot.off { background:var(--dim); }
#last-update { color:var(--sub); font-size:12px; font-variant-numeric:tabular-nums; }
#theme-btn {
  background:var(--surf-1); border:1px solid var(--border); color:var(--text);
  width:36px; height:36px; border-radius:10px; cursor:pointer;
  font-size:18px; display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
#theme-btn:hover { background:var(--surf-2); }

/* ── Banner ──────────────────────────────────────────────────────────── */
#bridge-banner {
  flex-shrink:0; background:#ef4444; color:white;
  text-align:center; padding:6px 24px; font-size:13px; font-weight:700;
}
#bridge-banner.hidden { display:none; }

/* ── Layout ──────────────────────────────────────────────────────────── */
#wrap { flex:1; display:flex; overflow:hidden; min-height:0; }
#left {
  flex:0 0 42%; display:flex; flex-direction:column;
  overflow-y:auto; overflow-x:hidden;
  border-right:1px solid var(--border);
}
#flow {
  padding:14px 20px; flex-shrink:0;
  background: var(--flow-grad);
}
#flow svg { width:100%; filter:drop-shadow(0 0 30px rgba(0,0,0,0.3)); }

/* ── SVG node styles (CSS vars so light/dark work) ─────────────────── */
.nb { fill:var(--node-fill); stroke:var(--node-stroke); stroke-width:1.5; }
.nl { fill:var(--node-label); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.nv { fill:var(--node-val); font-size:14px; font-weight:700; }
.nbig { font-size:20px; font-weight:800; }
@keyframes dash { to { stroke-dashoffset:-20; } }
.fl { fill:none; stroke:var(--dim); stroke-width:3.5; stroke-linecap:round; }
.fl-active { stroke-dasharray:7 13; }

/* ── Cards ───────────────────────────────────────────────────────────── */
#cards {
  display:grid; grid-template-columns:repeat(2,1fr); gap:12px;
  padding:0 20px 20px;
}
.card {
  background:var(--surf-1); backdrop-filter:blur(10px);
  border:1px solid var(--border); border-radius:20px;
  padding:20px; cursor:pointer; position:relative; overflow:hidden;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
}
.card:hover { transform:translateY(-3px); background:var(--surf-2); border-color:rgba(255,255,255,0.15); }
body.light .card:hover { border-color:rgba(0,0,0,0.15); }
.card.active-tab { border-color:var(--batt); box-shadow:0 0 0 2px rgba(0,242,255,0.15); }
.card-wide { grid-column:1/-1; }
.card.s-silent { opacity:0.55; filter:grayscale(0.4); }
.card-accent { position:absolute; top:0; left:0; right:0; height:3px; border-radius:20px 20px 0 0; }
.c-label { font-size:11px; font-weight:800; color:var(--sub); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.c-val-group { display:flex; align-items:baseline; gap:4px; margin-bottom:1px; }
.c-hero-num { font-size:40px; font-weight:800; letter-spacing:-1.5px; line-height:1; }
.c-hero-unit { font-size:16px; font-weight:600; color:var(--sub); }
.c-hero-label { font-size:12px; font-weight:600; color:var(--sub); margin-bottom:16px; }
.c-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
  padding-top:14px; border-top:1px solid var(--border);
}
.m-v { font-size:15px; font-weight:700; color:var(--text); }
.m-l { font-size:10px; font-weight:700; color:var(--sub); text-transform:uppercase; margin-top:2px; }

/* ── Right panel ─────────────────────────────────────────────────────── */
#right { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.tab-bar {
  display:flex; gap:6px; padding:12px 20px;
  background:var(--surf-1); border-bottom:1px solid var(--border);
  overflow-x:auto; flex-shrink:0;
}
.tab-btn {
  background:transparent; border:1px solid transparent; color:var(--sub);
  padding:7px 14px; border-radius:10px; cursor:pointer; white-space:nowrap;
  font-family:inherit; font-size:13px; font-weight:600; transition:all 0.2s; flex-shrink:0;
}
.tab-btn:hover { color:var(--text); background:var(--surf-2); }
.tab-btn.active { color:var(--text); background:var(--surf-2); border-color:var(--border); }
.range-bar {
  display:flex; gap:4px; padding:8px 20px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.r-btn {
  background:transparent; border:none; color:var(--sub);
  padding:4px 10px; border-radius:7px; cursor:pointer;
  font-family:inherit; font-size:12px; font-weight:600; transition:all 0.2s;
}
.r-btn.active { color:var(--batt); background:rgba(0,242,255,0.1); }
.chart-scroll { flex:1; overflow-y:auto; padding:20px; }
.chart-panel { display:none; }
.chart-panel.active { display:block; }
.chart-card {
  background:var(--surf-1); border:1px solid var(--border);
  border-radius:20px; padding:20px; margin-bottom:20px;
}
.chart-title { font-size:11px; font-weight:800; color:var(--sub); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }
.chart-container { height:210px; position:relative; }

/* ── Back button (mobile only) ───────────────────────────────────────── */
#back-btn {
  display:none; align-items:center; gap:10px; width:100%;
  padding:12px 20px; border:none; cursor:pointer; flex-shrink:0;
  background:var(--surf-1); border-bottom:1px solid var(--border);
  color:var(--text); font-size:14px; font-weight:700; font-family:inherit;
}
#back-btn:active { background:var(--surf-2); }

@media(max-width:1024px){
  #wrap { flex-direction:column; overflow-y:auto; }
  #left { flex:none; border-right:none; }
  #cards { grid-template-columns:1fr; }
}

@media(max-width:768px){
  body { overflow-y:auto; }
  #wrap { overflow:visible; min-height:auto; }
  #left { overflow:visible; }
  #flow { padding:10px 16px; }
  #cards { padding:0 16px 16px; gap:10px; }
  .card { padding:14px; }
  #right {
    position:fixed; inset:0; top:var(--hh); z-index:200;
    background:var(--bg); display:none; flex-direction:column;
  }
  body.mobile-detail #right { display:flex; }
  #back-btn { display:flex; }
  .tab-bar { padding:8px 12px; }
  .range-bar { padding:6px 12px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">☀</div>
    <span>Solar Monitor</span>
  </div>
  <div class="hdr-right">
    <div id="status-pills"></div>
    <span id="last-update">—</span>
    <button id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark">🌙</button>
  </div>
</header>

<div id="bridge-banner" class="hidden">Bridge Offline — check ESP32 connection</div>

<div id="wrap">
  <div id="left">
    <div id="flow">
      <svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g-solar" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffcc33"/><stop offset="100%" stop-color="#f97316"/>
          </linearGradient>
          <linearGradient id="g-batt-hi" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#3b82f6"/><stop offset="60%" stop-color="#00f2ff"/><stop offset="100%" stop-color="#10b981"/>
          </linearGradient>
          <linearGradient id="g-batt-lo" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#f59e0b"/>
          </linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
          <!-- Solar cell tile: 3 rows × 2 cols inside each PV box -->
          <pattern id="solar-cell" x="0" y="0" width="26" height="22" patternUnits="userSpaceOnUse">
            <rect x="1" y="1" width="24" height="20" rx="2"
              fill="rgba(30,58,138,0.22)" stroke="rgba(255,204,51,0.35)" stroke-width="0.6"/>
            <line x1="12.5" y1="1" x2="12.5" y2="21" stroke="rgba(255,204,51,0.15)" stroke-width="0.5"/>
          </pattern>
          <clipPath id="batt-clip"><rect x="154" y="254" width="192" height="74" rx="7"/></clipPath>
        </defs>

        <!-- PV Panel 1 — solar cell tile + label + value -->
        <rect id="pv1-box" class="nb" x="20" y="12" width="160" height="68" rx="12"/>
        <rect x="24" y="16" width="152" height="60" rx="9" fill="url(#solar-cell)" opacity="0.9"/>
        <!-- aluminium frame lines -->
        <line x1="24" y1="37" x2="176" y2="37" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
        <line x1="24" y1="55" x2="176" y2="55" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
        <line x1="76" y1="16" x2="76" y2="76" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
        <line x1="124" y1="16" x2="124" y2="76" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
        <text id="pv1-label" class="nl" x="100" y="29" text-anchor="middle" style="font-size:9px">—</text>
        <text class="nv" id="flow-pv1-volt" x="100" y="49" text-anchor="middle" style="font-size:11px;opacity:0.75">—</text>
        <text class="nv" id="flow-pv1-val" x="100" y="68" text-anchor="middle" style="font-size:14px;font-weight:800">—</text>

        <!-- PV Panel 2 -->
        <rect id="pv2-box" class="nb" x="320" y="12" width="160" height="68" rx="12"/>
        <rect x="324" y="16" width="152" height="60" rx="9" fill="url(#solar-cell)" opacity="0.9"/>
        <line x1="324" y1="37" x2="476" y2="37" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
        <line x1="324" y1="55" x2="476" y2="55" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
        <line x1="376" y1="16" x2="376" y2="76" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
        <line x1="424" y1="16" x2="424" y2="76" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
        <text id="pv2-label" class="nl" x="400" y="29" text-anchor="middle" style="font-size:9px">—</text>
        <text class="nv" id="flow-pv2-volt" x="400" y="49" text-anchor="middle" style="font-size:11px;opacity:0.75">—</text>
        <text class="nv" id="flow-pv2-val" x="400" y="68" text-anchor="middle" style="font-size:14px;font-weight:800">—</text>

        <!-- MPPT Nodes — labels updated from JS, clickable -->
        <rect id="mppt1-box" class="nb" x="20" y="112" width="160" height="86" rx="20" style="cursor:pointer" onclick="switchTab(0)"/>
        <text id="mppt1-label" class="nl" x="100" y="134" text-anchor="middle" style="cursor:pointer" onclick="switchTab(0)">—</text>
        <rect id="mppt1-status-bg" x="58" y="140" width="84" height="18" rx="9" fill="#1f2937"/>
        <text id="mppt1-status-txt" class="nl" x="100" y="153" text-anchor="middle" style="fill:white;font-size:9px;cursor:pointer" onclick="switchTab(0)">—</text>
        <text class="nv nbig" id="mppt1-flow-val" x="100" y="184" text-anchor="middle" style="cursor:pointer" onclick="switchTab(0)">—</text>

        <rect id="mppt2-box" class="nb" x="320" y="112" width="160" height="86" rx="20" style="cursor:pointer" onclick="switchTab(1)"/>
        <text id="mppt2-label" class="nl" x="400" y="134" text-anchor="middle" style="cursor:pointer" onclick="switchTab(1)">—</text>
        <rect id="mppt2-status-bg" x="358" y="140" width="84" height="18" rx="9" fill="#1f2937"/>
        <text id="mppt2-status-txt" class="nl" x="400" y="153" text-anchor="middle" style="fill:white;font-size:9px;cursor:pointer" onclick="switchTab(1)">—</text>
        <text class="nv nbig" id="mppt2-flow-val" x="400" y="184" text-anchor="middle" style="cursor:pointer" onclick="switchTab(1)">—</text>

        <!-- Battery: LiFePO4 rectangular pack (LiTime style) -->
        <!-- Main body -->
        <rect class="nb" x="150" y="248" width="200" height="84" rx="10" style="cursor:pointer" onclick="switchTab(2)"/>
        <!-- Cell dividers — 4S pack visual -->
        <line x1="200" y1="252" x2="200" y2="328" stroke="var(--node-stroke)" stroke-width="1.5"/>
        <line x1="250" y1="252" x2="250" y2="328" stroke="var(--node-stroke)" stroke-width="1.5"/>
        <line x1="300" y1="252" x2="300" y2="328" stroke="var(--node-stroke)" stroke-width="1.5"/>
        <!-- Negative terminal (-) bolt on top-left -->
        <rect x="162" y="238" width="20" height="12" rx="4" fill="var(--node-fill)" stroke="var(--node-stroke)" stroke-width="1.5"/>
        <text x="172" y="248" text-anchor="middle" style="fill:var(--sub);font-size:10px;font-weight:900">−</text>
        <!-- Positive terminal (+) bolt on top-right -->
        <rect x="318" y="238" width="20" height="12" rx="4" fill="var(--node-fill)" stroke="var(--node-stroke)" stroke-width="1.5"/>
        <text x="328" y="248" text-anchor="middle" style="fill:#ef4444;font-size:10px;font-weight:900">+</text>
        <!-- Charge fill bar -->
        <rect id="batt-fill-bar" x="154" y="252" width="0" height="76" fill="url(#g-batt-hi)" opacity="0.45" clip-path="url(#batt-clip)"/>
        <!-- Labels -->
        <text class="nl" x="250" y="266" text-anchor="middle" style="cursor:pointer;font-size:9px;letter-spacing:0.5px" onclick="switchTab(2)">LiFePO₄ · Battery</text>
        <text class="nv" id="flow-batt-v" x="208" y="300" text-anchor="middle" style="font-size:19px;font-weight:800;fill:var(--batt);cursor:pointer" onclick="switchTab(2)">—</text>
        <text id="flow-batt-soc" style="fill:var(--sub);font-size:12px;font-weight:700;cursor:pointer" x="308" y="290" text-anchor="middle" onclick="switchTab(2)">—</text>
        <text class="nv" id="flow-batt-t" x="308" y="308" text-anchor="middle" style="font-size:12px;fill:#9ca3af;cursor:pointer" onclick="switchTab(2)">—</text>

        <!-- Load nodes — hidden until JS shows them -->
        <g id="mppt1-load-grp" style="display:none">
          <circle class="nb" cx="42" cy="286" r="24"/>
          <text id="mppt1-load-val" class="nv" x="42" y="291" text-anchor="middle" style="font-size:11px">—</text>
          <text class="nl" x="42" y="318" text-anchor="middle">Load</text>
        </g>
        <g id="mppt2-load-grp" style="display:none">
          <circle class="nb" cx="458" cy="286" r="24"/>
          <text id="mppt2-load-val" class="nv" x="458" y="291" text-anchor="middle" style="font-size:11px">—</text>
          <text class="nl" x="458" y="318" text-anchor="middle">Load</text>
        </g>

        <!-- Flow paths -->
        <path id="path-pv1"         class="fl" d="M100,80  L100,112"/>
        <path id="path-pv2"         class="fl" d="M400,80  L400,112"/>
        <path id="path-mppt1"       class="fl" d="M100,198 C100,232 172,232 172,238"/>
        <path id="path-mppt2"       class="fl" d="M400,198 C400,232 328,232 328,238"/>
        <!-- load paths end at circle edge (r=24), not centre, so they don't overlap the label -->
        <path id="path-mppt1-load"  class="fl" d="M100,198 L55,266"   style="display:none"/>
        <path id="path-mppt2-load"  class="fl" d="M400,198 L445,266"  style="display:none"/>
      </svg>
    </div>
    <div id="cards"></div>
  </div>

  <div id="right">
    <button id="back-btn" onclick="closeMobileDetail()">← Back to overview</button>
    <div class="tab-bar" id="tab-bar">
      <!-- tab buttons injected by JS so names come from real device data -->
    </div>
    <div class="range-bar" id="range-bar"></div>
    <div class="chart-scroll">
      <!-- panels injected by JS -->
      <div id="panels"></div>
    </div>
  </div>
</div>

<script>
const RANGES=[
  {l:'1h',s:3600,st:'-1h'},{l:'6h',s:21600,st:'-6h'},{l:'24h',s:86400,st:'-24h'},
  {l:'7d',s:604800,st:'-7d'},{l:'30d',s:2592000,st:'-30d'},{l:'All',s:31536000,st:'-365d'}
];
const STATES={
  0:['Not charging','#374151'],
  1:['Low power',   '#374151'],
  2:['Fault',       '#ef4444'],
  3:['Bulk',        '#3b82f6'],
  4:['Absorption',  '#f59e0b'],
  5:['Float',       '#10b981'],
  6:['Storage',     '#10b981'],
  7:['Equalize',    '#a855f7'],
  9:['Inverting',   '#6366f1'],
  11:['Power supply','#0ea5e9'],
  245:['Starting up','#9ca3af'],
  246:['Rep. absorption','#f59e0b'],
  247:['Reconditioning', '#a855f7'],
  248:['BatterySafe',    '#10b981'],
  252:['Ext. control',   '#6366f1'],
};

let S={
  current:{}, devices:[], bridge_online:true,
  mptts:[], bsense:null,
  bvolt:null, bsoc:null,   // computed in renderFlow, shared with renderCards
  tab:3,                   // default: Insights (no device selected)
  range:'24h', last:null, chartsLoaded:false,
  tabDefs:[]               // [{id, label, field:'pv_power'|'battery_voltage', panel}]
};
let CH={};

// ── Utilities ──────────────────────────────────────────────────────────────

function fv(d,f,u='',dp=1){
  const v=d?.fields?.[f];
  if(v==null||isNaN(v)) return '—';
  return v.toFixed(dp)+(u?' '+u:'');
}
function fmtW(v){
  if(v==null||isNaN(v)) return '—';
  if(Math.abs(v)>=1000) return (v/1000).toFixed(2)+' kW';
  return v.toFixed(0)+' W';
}
function fmtWh(v){
  if(v==null||isNaN(v)) return '—';
  if(Math.abs(v)>=1000) return (v/1000).toFixed(2)+' kWh';
  return v.toFixed(0)+' Wh';
}
function wTick(v){ return Math.abs(v)>=1000?(v/1000).toFixed(1)+' kW':v+' W'; }
function whTick(v){ return Math.abs(v)>=1000?(v/1000).toFixed(2)+' kWh':v+' Wh'; }
function setText(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}

// ── LiFePO4 4S SOC estimate (resting voltage only — hide while charging) ────
const LFP_CURVE=[
  [13.60,100],[13.50,99],[13.40,95],[13.33,90],[13.30,80],
  [13.28,70],[13.25,60],[13.22,50],[13.20,40],[13.16,30],
  [13.10,20],[12.80,10],[12.00,0],
];
function lfp4Soc(v){
  if(v>=LFP_CURVE[0][0]) return 100;
  if(v<=LFP_CURVE[LFP_CURVE.length-1][0]) return 0;
  for(let i=0;i<LFP_CURVE.length-1;i++){
    const[v1,s1]=LFP_CURVE[i],[v2,s2]=LFP_CURVE[i+1];
    if(v>=v2) return Math.round(s2+(v-v2)/(v1-v2)*(s1-s2));
  }
  return 0;
}

function isLight(){ return document.body.classList.contains('light'); }
function chartColors(){
  return{
    grid: isLight()?'rgba(0,0,0,0.06)':'rgba(255,255,255,0.04)',
    tick: isLight()?'#94a3b8':'#6b7280',
    leg:  isLight()?'#64748b':'#9ca3af',
  };
}

// ── Theme ──────────────────────────────────────────────────────────────────

function setTheme(mode){
  document.body.classList.toggle('light', mode==='light');
  document.getElementById('theme-btn').textContent = mode==='light'?'🌙':'☀';
  // Recreate charts with new palette

// ── Poll ───────────────────────────────────────────────────────────────────

async function poll(){
  try{
    const[cur,devs]=await Promise.all([
      fetch('/api/v1/current').then(r=>r.json()),
      fetch('/api/v1/devices').then(r=>r.json())
    ]);
    S.current=cur;
    S.devices=devs.devices||[];
    S.bridge_online=devs.bridge_online;
    S.mptts=Object.keys(cur).filter(k=>'charge_state' in (cur[k].fields||{})).sort();
    S.bsense=Object.keys(cur).find(k=>'temperature' in (cur[k].fields||{}) && !('charge_state' in (cur[k].fields||{})))||null;
    S.last=Date.now();
    buildTabDefs();
    render();
    if(!S.chartsLoaded && S.tabDefs.length>0){ S.chartsLoaded=true; updateCharts(); }
  }catch(e){ console.error(e); }
}

// ── Tab definitions (built from real device data) ─────────────────────────

function buildTabDefs(){
  // Always: one tab per MPPT, one Battery tab, one Insights tab
  const defs=[];
  S.mptts.forEach((id,i)=>{
    defs.push({id, label:S.current[id]?.label||id, kind:'mppt', idx:i});
  });
  if(S.bsense||S.mptts.length>0){
    defs.push({id:S.bsense||'battery', label:'Battery', kind:'battery', idx:defs.length});
  }
  defs.push({id:'insights', label:'Insights', kind:'insights', idx:defs.length});
  S.tabDefs=defs;

  const INSIGHTS_IDX=defs.findIndex(d=>d.kind==='insights');
  if(S.tab===3 && INSIGHTS_IDX>=0) S.tab=INSIGHTS_IDX; // keep pointing to Insights

  // Build tab bar (only rebuild when tab count or active tab changes)
  const bar=document.getElementById('tab-bar');
  const tabHtml=defs.map((d,i)=>
    `<button class="tab-btn${i===S.tab?' active':''}" onclick="switchTab(${i})">${d.label}</button>`
  ).join('');
  if(bar.innerHTML!==tabHtml) bar.innerHTML=tabHtml;

  // Build panels if not yet done or count changed
  const wrap=document.getElementById('panels');
  if(parseInt(wrap.dataset.count||0)!==defs.length){
    wrap.dataset.count=defs.length;
    wrap.innerHTML=defs.map((d,i)=>{
      const active=i===S.tab?'active':'';
      if(d.kind==='mppt') return `
        <div id="panel-${i}" class="chart-panel ${active}">
          <div class="chart-card"><div class="chart-title">Solar Power</div><div class="chart-container"><canvas id="chart-${i}-p"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">PV Voltage</div><div class="chart-container"><canvas id="chart-${i}-pv"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Charge Current</div><div class="chart-container"><canvas id="chart-${i}-c"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Battery Voltage</div><div class="chart-container"><canvas id="chart-${i}-v"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Load Power</div><div class="chart-container"><canvas id="chart-${i}-l"></canvas></div></div>
        </div>`;
      if(d.kind==='battery') return `
        <div id="panel-${i}" class="chart-panel ${active}">
          <div class="chart-card"><div class="chart-title">Battery Voltage — All Sources</div><div class="chart-container"><canvas id="chart-${i}-v"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Temperature</div><div class="chart-container"><canvas id="chart-${i}-t"></canvas></div></div>
        </div>`;
      // insights
      return `
        <div id="panel-${i}" class="chart-panel ${active}">
          <div class="chart-card"><div class="chart-title">Combined Solar Output</div><div class="chart-container"><canvas id="chart-${i}-comb"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Daily Yield (Wh)</div><div class="chart-container"><canvas id="chart-${i}-bar"></canvas></div></div>
        </div>`;
    }).join('');
  }
}

// ── Render ─────────────────────────────────────────────────────────────────

function render(){
  document.getElementById('bridge-banner').classList.toggle('hidden',S.bridge_online!==false);
  renderFlow();
  renderCards();
  renderHeader();
}

function renderHeader(){
  document.getElementById('status-pills').innerHTML=S.devices.map(d=>
    `<div class="s-pill"><div class="s-dot ${d.online?'on':'off'}"></div>${d.label}</div>`
  ).join('');
  const ago=S.last?Math.round((Date.now()-S.last)/1000):0;
  document.getElementById('last-update').textContent=ago<2?'Live':`${ago}s ago`;
}

function renderFlow(){
  const m1=S.current[S.mptts[0]], m2=S.current[S.mptts[1]];
  const bs=S.bsense?S.current[S.bsense]:null;

  // Update node labels from real device data
  const lbl1=m1?.label||S.current[S.mptts[0]]?.label||'—';
  const lbl2=m2?.label||S.current[S.mptts[1]]?.label||'—';
  setText('pv1-label',  lbl1);
  setText('pv2-label',  lbl2);
  setText('mppt1-label',lbl1);
  setText('mppt2-label',lbl2);

  // PV power: Victron BLE only reports pv_power when actively generating.
  // Show actual value if present, "0 W" when charger is asleep, "—" when
  // charger is active but BLE packet doesn't include pv_power this cycle.
  setPvNode(1, m1);
  setPvNode(2, m2);

  updateMpptNode(1,m1);
  updateMpptNode(2,m2);

  // Battery voltage: prefer battery sense device, fall back to MPPT readings
  S.bvolt = bs?.fields?.battery_voltage
           ?? m1?.fields?.battery_voltage
           ?? m2?.fields?.battery_voltage
           ?? null;

  // SOC: LiFePO4 discharge curve, but only valid at rest (not during Bulk/Absorption)
  const charging = S.mptts.some(id=>{
    const cs = S.current[id]?.fields?.charge_state;
    return cs===3||cs===4; // Bulk or Absorption
  });
  S.bsoc = (S.bvolt!=null && !charging) ? lfp4Soc(S.bvolt) : null;

  if(S.bvolt!=null){
    setText('flow-batt-v', S.bvolt.toFixed(2)+' V');
    setText('flow-batt-soc', charging ? 'chg' : S.bsoc.toFixed(0)+'%');
    const bar=document.getElementById('batt-fill-bar');
    if(bar){
      bar.setAttribute('width', String(S.bsoc/100*192));
      bar.setAttribute('fill', S.bsoc<20?'url(#g-batt-lo)':'url(#g-batt-hi)');
    }
  } else {
    setText('flow-batt-v','—');
    setText('flow-batt-soc','—');
  }

  const temp=bs?.fields?.temperature??null;
  setText('flow-batt-t', temp!=null?temp.toFixed(1)+'°C':'');

  setLoadNode(1,m1); setLoadNode(2,m2);

  const pv1=pvWatts(m1), pv2=pvWatts(m2);
  updatePath('path-pv1',   pv1??0,                          '#ffcc33', 50);   // max 50W panel
  updatePath('path-pv2',   pv2??0,                          '#ffcc33', 50);   // max 50W panel
  updatePath('path-mppt1', m1?.fields?.charge_current??0,   '#00f2ff',  4);   // max 4A
  updatePath('path-mppt2', m2?.fields?.charge_current??0,   '#00f2ff',  4);   // max 4A
}

function pvWatts(m){
  if(!m) return null;
  if(m.fields?.pv_power!=null) return m.fields.pv_power;
  // charge_state=0 (Sleep) ⇒ confirmed zero generation
  if((m.fields?.charge_state??-1)===0) return 0;
  return null; // active but BLE packet didn't include pv_power this cycle
}

function setPvNode(idx,m){
  const w=pvWatts(m);
  setText(`flow-pv${idx}-val`, w!=null ? fmtW(w) : '—');
  const volt=m?.fields?.pv_voltage;
  setText(`flow-pv${idx}-volt`, volt!=null ? volt.toFixed(1)+' V' : '—');
  const box=document.getElementById(`pv${idx}-box`);
  if(box){
    box.style.stroke = (w!=null&&w>5) ? 'rgba(255,204,51,0.55)' : '';
    box.style.filter = (w!=null&&w>5) ? 'url(#glow)' : '';
  }
}

function setLoadNode(idx,m){
  const lp=m?.fields?.load_power??0;
  const hasField='load_power' in (m?.fields||{});
  const grp=document.getElementById(`mppt${idx}-load-grp`);
  const pth=document.getElementById(`path-mppt${idx}-load`);
  if(!grp) return;

  // Field absent → device has no load terminal, hide entirely
  if(!hasField){
    grp.style.display='none';
    if(pth) pth.style.display='none';
    return;
  }

  grp.style.display='';
  const circle=grp.querySelector('circle');
  const valEl=document.getElementById(`mppt${idx}-load-val`);

  if(lp>=1){
    // Measurable draw — full colour, animated flow
    if(circle) circle.style.opacity='';
    if(valEl)  valEl.style.fill='';
    setText(`mppt${idx}-load-val`, lp.toFixed(0)+' W');
    if(pth) pth.style.display='';
    updatePath(`path-mppt${idx}-load`,lp,'#ff4b2b',100);
  }else{
    // Field present but below measurement floor — dim node, no flow path
    if(circle) circle.style.opacity='0.4';
    if(valEl)  valEl.style.fill='var(--sub)';
    setText(`mppt${idx}-load-val`,'~0 W');
    if(pth){
      pth.style.display='none';
      if(pth.classList.contains('fl-active')){
        pth.classList.remove('fl-active');
        pth.style.stroke=pth.style.filter=pth.style.animation='';
      }
    }
  }
}

function updateMpptNode(idx,d){
  const cs=Math.round(d?.fields?.charge_state??0);
  const st=STATES[cs]||STATES[0];
  const txt=document.getElementById(`mppt${idx}-status-txt`);
  const bg =document.getElementById(`mppt${idx}-status-bg`);
  const box=document.getElementById(`mppt${idx}-box`);
  if(txt){txt.textContent=st[0];txt.style.fill=st[1]==='#374151'?'#9ca3af':'white';}
  if(bg) bg.setAttribute('fill',st[1]+'33');
  if(box) box.style.stroke=st[0]!=='Sleep'?st[1]+'88':'';

  // MPPT big value: charge current when present, else battery voltage
  const big = d?.fields?.charge_current!=null
    ? fv(d,'charge_current',' A')
    : fv(d,'battery_voltage',' V',2);
  setText(`mppt${idx}-flow-val`, big);
}

function updatePath(id,val,col,maxVal){
  const p=document.getElementById(id); if(!p) return;
  if(val>0.05){
    const ratio=Math.min(val/maxVal,1);
    const dur=(Math.max(0.5, 3.0-ratio*2.5)).toFixed(2);
    const anim=`dash ${dur}s linear infinite`;
    // Guard: only touch style when values actually change to avoid animation restarts
    if(!p.classList.contains('fl-active') || p.style.stroke!==col || p.style.animation!==anim){
      p.classList.add('fl-active');
      p.style.stroke=col;
      p.style.filter='url(#glow)';
      p.style.animation=anim;
    }
  }else if(p.classList.contains('fl-active')){
    p.classList.remove('fl-active');
    p.style.stroke=''; p.style.filter=''; p.style.animation='';
  }
}

// ── Cards ──────────────────────────────────────────────────────────────────

let _cardsKey='';

function renderCards(){
  const cont=document.getElementById('cards');
  const ids=[...S.mptts,...(S.bsense?[S.bsense]:[])];
  // Skip rebuild if the data that drives card content hasn't changed
  const key=ids.map(id=>{
    const f=S.current[id]?.fields||{};
    return `${id}:${f.pv_power??''}:${f.pv_voltage??''}:${f.charge_state??''}:${f.charge_current??''}:${f.battery_voltage??''}:${f.yield_today??''}:${f.temperature??''}:${S.tab}`;
  }).join('|')+(S.bridge_online?'1':'0');
  if(key===_cardsKey) return;
  _cardsKey=key;

  cont.innerHTML=ids.map((id)=>{
    const d=S.current[id];
    const info=S.devices.find(x=>x.id===id);
    const isM=S.mptts.includes(id);
    const tabIdx=isM ? S.mptts.indexOf(id) : S.tabDefs.findIndex(t=>t.kind==='battery');
    const accent=isM?'#ffcc33':'var(--batt)';
    const isActive=S.tab===tabIdx;

    // ── MPPT card ──
    if(isM){
      const pvW=pvWatts(d);
      const hNum = pvW!=null ? fmtW(pvW) : '—';
      const hUnit= '';  // fmtW already includes unit
      const hLbl = pvW==null && (d?.fields?.charge_state??0)!==0
                 ? 'Solar — not in current packet'
                 : 'Solar Power';
      const bv   = fv(d,'battery_voltage',' V',2);
      const cc   = d?.fields?.charge_current!=null ? d.fields.charge_current.toFixed(2)+' A' : '—';
      const pvv  = d?.fields?.pv_voltage!=null ? d.fields.pv_voltage.toFixed(1)+' V' : '—';
      const yt   = fmtWh(d?.fields?.yield_today??null);
      const cs   = Math.round(d?.fields?.charge_state??0);
      const stLbl= (STATES[cs]||STATES[0])[0];
      return `<div class="card${!info?.online?' s-silent':''}${isActive?' active-tab':''}"
                   onclick="switchTab(${tabIdx})" style="padding-top:22px">
        <div class="card-accent" style="background:${accent}"></div>
        <div class="c-label">${d.label} <span style="font-weight:400;opacity:0.6;font-size:9px">${stLbl}</span></div>
        <div class="c-val-group">
          <span class="c-hero-num" style="color:${accent}">${hNum}</span>
        </div>
        <div class="c-hero-label">${hLbl}</div>
        <div class="c-grid" style="grid-template-columns:repeat(2,1fr)">
          <div><div class="m-v">${bv}</div><div class="m-l">Battery V</div></div>
          <div><div class="m-v">${cc}</div><div class="m-l">Charge A</div></div>
          <div><div class="m-v">${pvv}</div><div class="m-l">PV Volt</div></div>
          <div><div class="m-v">${yt}</div><div class="m-l">Today</div></div>
        </div>
      </div>`;
    }

    // ── Battery Sense card ──
    // Use shared S.bvolt / S.bsoc (same fallback chain as the flow diagram)
    const bvDisp  = S.bvolt!=null ? S.bvolt.toFixed(2) : '—';
    const socDisp = S.bsoc!=null  ? S.bsoc.toFixed(0)+'%' : '—';
    const tmpDisp = fv(d,'temperature','°C');
    const battSrc = d?.fields?.battery_voltage!=null ? d.label
                  : S.mptts.length>0 ? (S.current[S.mptts[0]]?.label||'MPPT') : '—';
    return `<div class="card${!info?.online?' s-silent':''}${isActive?' active-tab':''}${S.mptts.length%2===0?' card-wide':''}"
                 onclick="switchTab(${tabIdx})" style="padding-top:22px">
      <div class="card-accent" style="background:${accent}"></div>
      <div class="c-label">${d.label}</div>
      <div class="c-val-group">
        <span class="c-hero-num" style="color:${accent}">${bvDisp}</span>
        <span class="c-hero-unit">V</span>
      </div>
      <div class="c-hero-label">Battery Voltage${d?.fields?.battery_voltage==null?' (via '+battSrc+')':''}</div>
      <div class="c-grid">
        <div><div class="m-v">${tmpDisp}</div><div class="m-l">Temp</div></div>
        <div><div class="m-v">${socDisp}</div><div class="m-l">SOC</div></div>
        <div><div class="m-v">—</div><div class="m-l">—</div></div>
      </div>
    </div>`;
  }).join('');
}

// ── Tab switching ──────────────────────────────────────────────────────────

function switchTab(idx){
  S.tab=idx;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.chart-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  renderCards();
  updateCharts();
  if(window.innerWidth<=768) document.body.classList.add('mobile-detail');
}

function closeMobileDetail(){
  document.body.classList.remove('mobile-detail');
}

function switchRange(l){
  S.range=l;
  document.querySelectorAll('.r-btn').forEach(b=>b.classList.toggle('active',b.textContent===l));
  Object.values(CH).forEach(c=>c?.destroy()); CH={};
  updateCharts();
}

// ── Charts ─────────────────────────────────────────────────────────────────

async function updateCharts(){
  if(!S.tabDefs.length) return;
  const def=S.tabDefs[S.tab]; if(!def) return;
  const rng=RANGES.find(r=>r.l===S.range);
  const iv=Math.max(1,Math.ceil(rng.s/500))+'s';

  if(def.kind==='mppt'){
    const id=def.id;
    await drawLine(`chart-${S.tab}-p`, id,'pv_power',       rng.st,iv,'#ffcc33',wTick);
    await drawLine(`chart-${S.tab}-pv`,id,'pv_voltage',     rng.st,iv,'#a78bfa',' V');
    await drawLine(`chart-${S.tab}-c`, id,'charge_current', rng.st,iv,'#10b981',' A');
    await drawLine(`chart-${S.tab}-v`, id,'battery_voltage',rng.st,iv,'#00f2ff',' V');
    await drawLine(`chart-${S.tab}-l`, id,'load_power',     rng.st,iv,'#f97316',wTick);
  }else if(def.kind==='battery'){
    const voltIds=[...(S.bsense?[S.bsense]:[]),...S.mptts];
    await drawMulti(`chart-${S.tab}-v`,voltIds,'battery_voltage',rng.st,iv,' V');
    if(S.bsense) await drawLine(`chart-${S.tab}-t`,S.bsense,'temperature',rng.st,iv,'#f97316','°C');
  }else{
    await drawMulti(`chart-${S.tab}-comb`,S.mptts,'pv_power',rng.st,iv,wTick);
    await drawDailyBar(`chart-${S.tab}-bar`);
  }
}

async function hFetch(dev,field,start,iv){
  const r=await fetch(`/api/v1/history?device=${encodeURIComponent(dev)}&field=${field}&start=${start}&interval=${iv}`);
  return r.json();
}

function grad(ctx2d,col){
  const g=ctx2d.createLinearGradient(0,0,0,210);
  g.addColorStop(0,col+'55'); g.addColorStop(1,col+'00'); return g;
}

function baseOpts(unit){
  const c=chartColors();
  const tickFn=typeof unit==='function' ? unit : v=>`${v}${unit}`;
  return{
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{type:'time',grid:{color:c.grid},ticks:{color:c.tick,font:{size:11},maxTicksLimit:8}},
      y:{grid:{color:c.grid},ticks:{color:c.tick,font:{size:11},maxTicksLimit:6,callback:tickFn},border:{dash:[4,4]}}
    }
  };
}

async function drawLine(cid,dev,field,start,iv,col,unit){
  const res=await hFetch(dev,field,start,iv);
  const canvas=document.getElementById(cid); if(!canvas)return;
  if(CH[cid])CH[cid].destroy();
  const ctx=canvas.getContext('2d');
  CH[cid]=new Chart(canvas,{
    type:'line',
    data:{datasets:[{data:(res.points||[]).map(p=>({x:p.t,y:p.v})),
      borderColor:col, backgroundColor:grad(ctx,col), fill:true,
      borderWidth:2, pointRadius:0, tension:0.3}]},
    options:baseOpts(unit)
  });
}

async function drawMulti(cid,ids,field,start,iv,unit){
  const canvas=document.getElementById(cid); if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const COLS=['#00f2ff','#ffcc33','#10b981'];
  const datasets=await Promise.all(ids.map(async(id,i)=>{
    const res=await hFetch(id,field,start,iv);
    const col=COLS[i%COLS.length];
    return{label:S.current[id]?.label||id,
      data:(res.points||[]).map(p=>({x:p.t,y:p.v})),
      borderColor:col, backgroundColor:i===0?grad(ctx,col):'transparent',
      fill:i===0, borderWidth:2, pointRadius:0, tension:0.3};
  }));
  if(CH[cid])CH[cid].destroy();
  const c=chartColors();
  CH[cid]=new Chart(canvas,{
    type:'line', data:{datasets},
    options:{...baseOpts(unit),
      plugins:{legend:{display:true,labels:{color:c.leg,font:{size:11},boxWidth:12}}}}
  });
}

// Range → days for the daily yield bar chart
const RANGE_DAYS={'1h':1,'6h':1,'24h':1,'7d':7,'30d':30,'All':365};

// Cache responses per day-count for 5 minutes — aggregation query is expensive
let _dailyCache={};

async function drawDailyBar(cid){
  const days=RANGE_DAYS[S.range]??30;
  const todayOnly=days===1;
  const tzOff=-(new Date().getTimezoneOffset())/60;
  const cacheKey=todayOnly?`today_${tzOff}`:days;
  const now=Date.now();
  let res;
  const cached=_dailyCache[cacheKey];
  if(cached && now-cached.ts<5*60*1000){
    res=cached.result;
  }else{
    const url=todayOnly
      ?`/api/v1/daily?days=1&today_only=true&tz_offset=${tzOff}`
      :`/api/v1/daily?days=${days}&tz_offset=${tzOff}`;
    res=await fetch(url).then(r=>r.json());
    _dailyCache[cacheKey]={result:res,ts:now};
  }
  const canvas=document.getElementById(cid); if(!canvas)return;
  const titleEl=canvas.closest('.chart-card')?.querySelector('.chart-title');
  if(titleEl) titleEl.textContent=days===1?'Today\'s Yield (Wh)':`${days}-Day Yield (Wh)`;
  if(CH[cid])CH[cid].destroy();
  const c=chartColors();
  const COLS=['rgba(255,204,51,0.75)','rgba(16,185,129,0.75)'];
  CH[cid]=new Chart(canvas,{
    type:'bar',
    data:{
      labels:res.days.map(d=>d.date),
      datasets:S.mptts.map((id,i)=>({
        label:S.current[id]?.label||id,
        data:res.days.map(d=>(d.devices[id]||0)),
        backgroundColor:COLS[i%2], borderRadius:4
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{color:c.leg,font:{size:11},boxWidth:12}}},
      scales:{
        x:{stacked:true,grid:{color:c.grid},ticks:{color:c.tick,font:{size:11}}},
        y:{stacked:true,grid:{color:c.grid},ticks:{color:c.tick,font:{size:11},callback:whTick}}
      }
    }
  });
}

// ── Init ──────────────────────────────────────────────────────────────────

(function(){
  // Range buttons
  const rb=document.getElementById('range-bar');
  RANGES.forEach(r=>{
    const b=document.createElement('button');
    b.className=`r-btn ${r.l===S.range?'active':''}`;
    b.textContent=r.l;
    b.onclick=()=>switchRange(r.l);
    rb.appendChild(b);
  });

  // Auto theme: day hours (7–20) = light, night = dark
  const h=new Date().getHours();
  setTheme(h>=7&&h<20?'light':'dark');

  poll();
  setInterval(poll,2000);
})();
</script>
