<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solar Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
:root {
  --bg:          #05070a;
  --bg-grad:     radial-gradient(circle at 50% -20%, #1e1b4b 0%, #05070a 70%);
  --flow-grad:   radial-gradient(circle at center, rgba(30,58,138,0.12) 0%, transparent 100%);
  --surf-1:      rgba(17,24,39,0.70);
  --surf-2:      rgba(31,41,55,0.50);
  --border:      rgba(255,255,255,0.08);
  --text:        #f3f4f6;
  --sub:         #9ca3af;
  --dim:         #4b5563;
  --hdr-bg:      rgba(5,7,10,0.85);
  --node-fill:   #0f172a;
  --node-stroke: rgba(255,255,255,0.08);
  --node-label:  #9ca3af;
  --node-val:    #ffffff;
  --chart-grid:  rgba(255,255,255,0.04);
  --chart-tick:  #6b7280;
  --chart-leg:   #9ca3af;
  --solar:  #ffcc33;
  --batt:   #00f2ff;
  --charge: #10b981;
  --red:    #ef4444;
  --amber:  #f59e0b;
  --hh: 64px;
}
body.light {
  --bg:          #f1f5f9;
  --bg-grad:     radial-gradient(circle at 50% -20%, #cbd5e1 0%, #f1f5f9 70%);
  --flow-grad:   radial-gradient(circle at center, rgba(203,213,225,0.4) 0%, transparent 100%);
  --surf-1:      rgba(255,255,255,0.95);
  --surf-2:      rgba(241,245,249,1);
  --border:      rgba(15,23,42,0.15);
  --text:        #0f172a;
  --sub:         #475569;
  --dim:         #64748b;
  --batt:        #0e7490;
  --charge:      #047857;
  --hdr-bg:      rgba(241,245,249,0.95);
  --node-fill:   #ffffff;
  --node-stroke: rgba(15,23,42,0.20);
  --node-label:  #475569;
  --node-val:    #0f172a;
  --chart-grid:  rgba(15,23,42,0.08);
  --chart-tick:  #64748b;
  --chart-leg:   #475569;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { height:100%; }
body {
  height:100%; display:flex; flex-direction:column; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; line-height:1.6;
  transition:background 0.3s,color 0.3s;
}
body::before {
  content:''; position:fixed; inset:0; z-index:-1;
  background:var(--bg-grad); transition:background 0.3s;
}

/* ── Header ──────────────────────────────────────────────────────────── */
header {
  flex-shrink:0; height:var(--hh);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
  background:var(--hdr-bg); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); z-index:50;
}
.logo { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:800; letter-spacing:-0.5px; white-space:nowrap; }
.logo-icon {
  width:36px; height:36px; border-radius:10px;
  background:linear-gradient(135deg,#ffcc33,#f97316);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; box-shadow:0 0 20px rgba(251,191,36,0.3);
}
.hdr-right { display:flex; align-items:center; gap:12px; }
#status-pills { display:flex; align-items:center; gap:10px; }
.s-pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--sub); }
.s-dot  { width:8px; height:8px; border-radius:50%; }
.s-dot.on  { background:var(--charge); box-shadow:0 0 10px var(--charge); }
.s-dot.off { background:var(--dim); }
#last-update { color:var(--sub); font-size:12px; font-variant-numeric:tabular-nums; }
#theme-btn {
  background:var(--surf-2); border:1px solid var(--border); color:var(--text);
  width:36px; height:36px; border-radius:10px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
#theme-btn:hover { background:var(--surf-1); }

/* ── Site dropdown ───────────────────────────────────────────────────── */
.site-dropdown { position:relative; }
#site-btn {
  display:flex; align-items:center; gap:7px;
  background:var(--surf-2); border:1px solid var(--border); color:var(--text);
  padding:0 12px; height:36px; border-radius:10px; cursor:pointer;
  font-family:inherit; font-size:13px; font-weight:600;
  transition:all 0.2s; white-space:nowrap; max-width:200px;
}
#site-btn:hover { background:var(--surf-1); }
#site-btn-label { overflow:hidden; text-overflow:ellipsis; }
#site-menu {
  position:absolute; right:0; top:calc(100% + 8px);
  background:var(--hdr-bg); backdrop-filter:blur(16px);
  border:1px solid var(--border); border-radius:14px;
  min-width:180px; overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,0.35); z-index:100;
}
#site-menu.hidden { display:none; }
.site-menu-item {
  display:flex; align-items:center; gap:8px; width:100%;
  padding:9px 14px; background:transparent; border:none; color:var(--text);
  font-family:inherit; font-size:13px; font-weight:500;
  text-align:left; cursor:pointer; transition:background 0.12s;
}
.site-menu-item:hover { background:var(--surf-2); }
.site-menu-item.active { color:var(--batt); font-weight:700; }
.site-menu-check { width:14px; font-size:11px; color:var(--batt); flex-shrink:0; }
.site-menu-divider { height:1px; background:var(--border); }
.site-menu-all { color:var(--sub); font-size:12px; }
.site-menu-all:hover { color:var(--text); }

/* ── Site Picker ─────────────────────────────────────────────────────── */
#site-picker {
  flex:1; display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 24px; overflow-y:auto; min-height:0;
}
.picker-header { text-align:center; margin-bottom:36px; }
.picker-header h1 { font-size:26px; font-weight:800; letter-spacing:-0.5px; margin-bottom:6px; }
.picker-header p { font-size:14px; color:var(--sub); }
#picker-cards {
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:20px; max-width:740px; width:100%;
}
.picker-card {
  background:var(--surf-1); backdrop-filter:blur(12px);
  border:1.5px solid var(--border); border-radius:20px;
  padding:24px 20px 20px; cursor:pointer;
  transition:transform 0.25s cubic-bezier(.4,0,.2,1),border-color 0.25s,box-shadow 0.25s;
  display:flex; flex-direction:column; align-items:center; text-align:center;
}
.picker-card:hover {
  transform:translateY(-5px);
  border-color:rgba(255,204,51,0.45);
  box-shadow:0 16px 48px rgba(0,0,0,0.3),0 0 0 1px rgba(255,204,51,0.1);
}
body.light .picker-card:hover { box-shadow:0 12px 32px rgba(0,0,0,0.1); }
.site-illo { width:140px; height:116px; margin-bottom:14px; }
.picker-card h2 { font-size:17px; font-weight:800; margin-bottom:6px; }
.picker-status { min-height:22px; }
.pstatus-loading { color:var(--dim); font-size:14px; letter-spacing:3px; animation:blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }
.pstatus-val { font-size:15px; font-weight:700; color:var(--solar); }

/* ── Banner ──────────────────────────────────────────────────────────── */
#bridge-banner {
  flex-shrink:0; background:#ef4444; color:white;
  text-align:center; padding:6px 24px; font-size:13px; font-weight:700;
}
#bridge-banner.hidden { display:none; }

/* ── Main layout ─────────────────────────────────────────────────────── */
#wrap { flex:1; display:none; overflow:hidden; min-height:0; }
#left {
  flex:0 0 42%; display:flex; flex-direction:column;
  overflow-y:auto; overflow-x:hidden;
  border-right:2px solid var(--border);
}
#flow { padding:4px 20px; flex-shrink:0; background:var(--flow-grad); }
#flow svg { width:100%; height:auto; filter:drop-shadow(0 0 30px rgba(0,0,0,0.15)); }
body:not(.light) #flow svg { filter:drop-shadow(0 0 30px rgba(0,0,0,0.3)); }

.nb { fill:var(--node-fill); stroke:var(--node-stroke); stroke-width:1.5; }
.nl { fill:var(--node-label); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.nv { fill:var(--node-val); font-size:14px; font-weight:700; }
.nbig { font-size:20px; font-weight:800; }
@keyframes dash { to { stroke-dashoffset:-20; } }
.fl { fill:none; stroke:#64748b; stroke-width:4; stroke-linecap:butt; opacity:1.0; }
.fl-active { stroke-dasharray:7 13; }

/* ── Cards ───────────────────────────────────────────────────────────── */
#cards { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:0 20px 8px; }
.card {
  background:var(--surf-1); backdrop-filter:blur(10px);
  border:1px solid var(--border); border-radius:20px;
  padding:16px; cursor:pointer; position:relative; overflow:hidden;
  transition:all 0.25s cubic-bezier(.4,0,.2,1);
}
.card:hover { transform:translateY(-3px); background:var(--surf-2); border-color:rgba(255,255,255,0.15); }
body.light .card:hover { border-color:rgba(0,0,0,0.15); }
.card.active-tab { border-color:var(--batt); box-shadow:0 0 0 2px rgba(0,242,255,0.15); }
.card-wide { grid-column:1/-1; }
.card.s-silent { opacity:0.55; filter:grayscale(0.4); }
.card-accent { position:absolute; top:0; left:0; right:0; height:3px; border-radius:20px 20px 0 0; }
.c-label { font-size:11px; font-weight:800; color:var(--sub); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.c-val-group { display:flex; align-items:baseline; gap:4px; margin-bottom:1px; }
.c-hero-num { font-size:40px; font-weight:800; letter-spacing:-1.5px; line-height:1; }
.c-hero-unit { font-size:16px; font-weight:600; color:var(--sub); }
.c-hero-label { font-size:12px; font-weight:600; color:var(--sub); margin-bottom:16px; }
.c-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding-top:14px; border-top:1px solid var(--border); }
.m-v { font-size:15px; font-weight:700; color:var(--text); }
.m-l { font-size:10px; font-weight:700; color:var(--sub); text-transform:uppercase; margin-top:2px; }
.soc-bar-track { background:var(--surf-2); border-radius:6px; height:6px; margin:10px 0 14px; overflow:hidden; }
.soc-bar-fill { height:100%; border-radius:6px; transition:width 0.6s cubic-bezier(.4,0,.2,1); }

/* ── Right panel ─────────────────────────────────────────────────────── */
#right { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.tab-bar {
  display:flex; gap:6px; padding:12px 20px;
  background:var(--surf-1); border-bottom:1px solid var(--border);
  overflow-x:auto; flex-shrink:0;
}
.tab-btn {
  background:transparent; border:1px solid transparent; color:var(--sub);
  padding:7px 14px; border-radius:10px; cursor:pointer; white-space:nowrap;
  font-family:inherit; font-size:13px; font-weight:600; transition:all 0.2s; flex-shrink:0;
}
.tab-btn:hover { color:var(--text); background:var(--surf-2); }
.tab-btn.active { color:var(--text); background:var(--surf-2); border-color:var(--border); }
.range-bar { display:flex; gap:4px; padding:8px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
.r-btn {
  background:transparent; border:none; color:var(--sub);
  padding:4px 10px; border-radius:7px; cursor:pointer;
  font-family:inherit; font-size:12px; font-weight:600; transition:all 0.2s;
}
.r-btn.active { color:var(--batt); background:rgba(0,242,255,0.1); }
.chart-scroll { flex:1; overflow-y:auto; padding:20px; }
.chart-panel { display:none; }
.chart-panel.active { display:block; }
.chart-card { background:var(--surf-1); border:1px solid var(--border); border-radius:20px; padding:20px; margin-bottom:20px; }
.chart-title { font-size:11px; font-weight:800; color:var(--sub); text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }
.chart-container { height:210px; position:relative; }

/* ── Settings panel ──────────────────────────────────────────────────── */
#settings-overlay {
  position:fixed; inset:0; z-index:400;
  background:rgba(0,0,0,0.45); backdrop-filter:blur(4px);
  display:flex; align-items:stretch; justify-content:flex-end;
}
#settings-overlay.hidden { display:none; }
#settings-panel {
  width:min(460px,100vw); height:100%;
  background:var(--bg); border-left:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  animation:spanel-in 0.22s cubic-bezier(.4,0,.2,1);
}
@keyframes spanel-in { from{transform:translateX(100%)} to{transform:translateX(0)} }
.sp-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.sp-title { font-size:16px; font-weight:800; }
.sp-close {
  background:var(--surf-2); border:1px solid var(--border); color:var(--text);
  width:32px; height:32px; border-radius:8px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:18px; line-height:1;
  transition:background 0.15s;
}
.sp-close:hover { background:var(--surf-1); }
.sp-scroll { flex:1; overflow-y:auto; padding:16px 20px; }
.sp-section { margin-bottom:20px; }
.sp-section-title {
  font-size:11px; font-weight:800; color:var(--sub);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;
}
.sp-device-row {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; background:var(--surf-1);
  border:1px solid var(--border); border-radius:12px; margin-bottom:8px;
}
.sp-device-info { flex:1; min-width:0; }
.sp-device-name { font-size:13px; font-weight:700; }
.sp-device-sub  { font-size:11px; color:var(--sub); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sp-remove-btn {
  background:transparent; border:1px solid rgba(239,68,68,0.4); color:#ef4444;
  padding:5px 10px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600;
  font-family:inherit; transition:all 0.15s; flex-shrink:0; white-space:nowrap;
}
.sp-remove-btn:hover { background:rgba(239,68,68,0.12); }
.sp-add-btn {
  display:flex; align-items:center; gap:8px; width:100%;
  padding:10px 14px; background:var(--surf-2); border:1px solid var(--border);
  border-radius:12px; color:var(--text); font-family:inherit; font-size:13px;
  font-weight:600; cursor:pointer; transition:all 0.15s; margin-bottom:8px;
}
.sp-add-btn:hover { background:var(--surf-1); border-color:rgba(255,255,255,0.15); }
.sp-add-icon {
  width:26px; height:26px; border-radius:7px;
  background:rgba(16,185,129,0.15); display:flex; align-items:center; justify-content:center;
  font-size:16px; line-height:1; color:var(--charge); flex-shrink:0;
}
.sp-scan-area { margin-top:12px; }
.sp-scan-loading {
  display:flex; align-items:center; gap:10px; padding:14px 12px;
  background:var(--surf-1); border:1px solid var(--border); border-radius:12px;
  color:var(--sub); font-size:13px;
}
.sp-spinner {
  width:18px; height:18px; border:2px solid var(--border);
  border-top-color:var(--charge); border-radius:50%;
  animation:spin 0.8s linear infinite; flex-shrink:0;
}
@keyframes spin { to { transform:rotate(360deg); } }
.sp-scan-result {
  padding:12px; background:var(--surf-1); border:1.5px solid var(--border);
  border-radius:12px; margin-bottom:8px;
}
.sp-scan-result:hover { border-color:rgba(16,185,129,0.4); }
.sp-scan-mac  { font-size:10px; color:var(--sub); margin-bottom:4px; letter-spacing:0.5px; }
.sp-scan-vals { display:flex; gap:14px; margin-bottom:10px; }
.sp-scan-val  { text-align:center; }
.sp-scan-num  { font-size:18px; font-weight:800; }
.sp-scan-lbl  { font-size:10px; color:var(--sub); font-weight:600; text-transform:uppercase; }
.sp-scan-add  {
  width:100%; padding:7px; background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3);
  color:var(--charge); border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px;
  font-weight:700; transition:all 0.15s;
}
.sp-scan-add:hover { background:rgba(16,185,129,0.25); }
.sp-form { margin-top:10px; }
.sp-field { margin-bottom:10px; }
.sp-field label { display:block; font-size:11px; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.sp-field input {
  width:100%; padding:8px 10px; background:var(--surf-2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:inherit; font-size:13px;
  outline:none; transition:border-color 0.15s;
}
.sp-field input:focus { border-color:rgba(0,242,255,0.4); }
.sp-submit {
  width:100%; padding:9px; background:var(--batt); border:none; border-radius:8px;
  color:#000; font-family:inherit; font-size:13px; font-weight:800; cursor:pointer;
  transition:opacity 0.15s; margin-top:4px;
}
.sp-submit:hover { opacity:0.85; }
.sp-submit:disabled { opacity:0.4; cursor:not-allowed; }
.sp-confirm-overlay {
  position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.6);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.sp-confirm-overlay.hidden { display:none; }
.sp-confirm-box {
  background:var(--bg); border:1px solid var(--border); border-radius:16px;
  padding:24px; max-width:340px; width:100%;
}
.sp-confirm-title { font-size:16px; font-weight:800; margin-bottom:8px; }
.sp-confirm-msg   { font-size:13px; color:var(--sub); margin-bottom:20px; line-height:1.5; }
.sp-confirm-btns  { display:flex; gap:8px; }
.sp-confirm-cancel {
  flex:1; padding:9px; background:var(--surf-2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:inherit; font-size:13px;
  font-weight:700; cursor:pointer;
}
.sp-confirm-ok {
  flex:1; padding:9px; background:#ef4444; border:none;
  border-radius:8px; color:white; font-family:inherit; font-size:13px;
  font-weight:800; cursor:pointer;
}
#settings-gear {
  background:var(--surf-2); border:1px solid var(--border); color:var(--text);
  width:36px; height:36px; border-radius:10px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
#settings-gear:hover { background:var(--surf-1); }

/* ── Back button ─────────────────────────────────────────────────────── */
#back-btn {
  display:none; align-items:center; gap:10px; width:100%;
  padding:12px 20px; border:none; cursor:pointer; flex-shrink:0;
  background:var(--surf-1); border-bottom:1px solid var(--border);
  color:var(--text); font-size:14px; font-weight:700; font-family:inherit;
}
#back-btn:active { background:var(--surf-2); }

@media(max-width:1024px){
  #wrap { flex-direction:column; overflow-y:auto; }
  #left { flex:none; border-right:none; }
  #cards { grid-template-columns:1fr; }
}
@media(max-width:768px){
  body { overflow-y:auto; }
  #wrap { overflow:visible; min-height:auto; }
  #left { overflow:visible; }
  #flow { padding:10px 16px; }
  #cards { padding:0 16px 16px; gap:10px; }
  .card { padding:14px; }
  #right {
    position:fixed; inset:0; top:var(--hh); z-index:200;
    background:var(--bg); display:none; flex-direction:column;
  }
  body.mobile-detail #right { display:flex; }
  #back-btn { display:flex; }
  #status-pills,#last-update { display:none; }
  .logo { font-size:15px; }
  .tab-bar { padding:8px 12px; }
  .range-bar { padding:6px 12px; }
  #picker-cards { grid-template-columns:1fr; gap:14px; max-width:400px; }
  .site-illo { width:110px; height:90px; margin-bottom:10px; }
  .picker-header h1 { font-size:22px; }
  #site-btn { max-width:130px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">&#9728;</div>
    <span>Solar Monitor</span>
  </div>
  <div class="hdr-right">
    <div class="site-dropdown" id="site-dropdown" style="display:none">
      <button id="site-btn" onclick="toggleSiteDropdown()">
        <span id="site-btn-label">-</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
      <div id="site-menu" class="hidden"></div>
    </div>
    <div id="status-pills"></div>
    <span id="last-update">-</span>
    <button id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark">

function fv(d,f,u='',dp=1){
  const v=d?.fields?.[f];

  return v.toFixed(dp)+(u?' '+u:'');
}
function fmtW(v){
  if(v==null||isNaN(v)) return '-';
  if(Math.abs(v)>=1000) return (v/1000).toFixed(2)+' kW';
  return v.toFixed(0)+' W';
}
function fmtWh(v){
  if(v==null||isNaN(v)) return '-';
  if(Math.abs(v)>=1000) return (v/1000).toFixed(2)+' kWh';
  return v.toFixed(0)+' Wh';
}
function wTick(v){ return Math.abs(v)>=1000?(v/1000).toFixed(1)+' kW':v+' W'; }

const LFP_CURVE=[
  [13.60,100],[13.40,99],[13.30,90],[13.20,80],[13.10,70],
  [13.00,60],[12.90,50],[12.80,40],[12.70,30],[12.60,20],
  [12.00,10],[10.00,0]
];
function lfp4Soc(v){
  if(v>=LFP_CURVE[0][0]) return 100;
  if(v<=LFP_CURVE[LFP_CURVE.length-1][0]) return 0;
  for(let i=0;i<LFP_CURVE.length-1;i++){
    const[v1,s1]=LFP_CURVE[i],[v2,s2]=LFP_CURVE[i+1];
    if(v>=v2) return Math.round(s2+(v-v2)/(v1-v2)*(s1-s2));
  }
  return 0;
}

async function renderPickerCards(){
  const cont=document.getElementById('picker-cards');
  cont.innerHTML=S.sites.map(site=>`
    <div class="picker-card" onclick="selectSite('${site.id}')">

async function fetchSiteStatus(site){
  if(site.ui?.battery_display==='bms'){
    try{
      const batt=await fetch(`/api/v1/battery?site=${site.id}`).then(r=>r.json());
      const first=Object.values(batt)[0];
      if(first?.fields?.soc!=null) return `${first.fields.soc.toFixed(0)}% SOC`;
    }catch(e){}
  }
  const cur=await fetch(`/api/v1/current?site=${site.id}`).then(r=>r.json());
  let total=0, hasData=false;
  for(const d of Object.values(cur)){
    if(d.fields?.pv_power!=null){ total+=d.fields.pv_power; hasData=true; }
  }
  if(!hasData) return 'No data';
  return total>=1000?`${(total/1000).toFixed(2)} kW solar`:`${Math.round(total)} W solar`;
}

function selectSite(id){
  const site=S.sites.find(s=>s.id===id)||{id,label:id,ui:{},bridge:'esp32'};
  S.activeSite=id;
  S.siteUi=site.ui||{};
  localStorage.setItem('victron_selected_site',id);

  S.current={}; S.devices=[]; S.mptts=[]; S.chargers=[]; S.bsense=null;
  S.bvolt=null; S.bsoc=null; S.battData={}; S.bmsDevice=null;
  S.chartsLoaded=false; S.last=null; _cardsKey=''; _dailyCache={};
  S.tempProviders=site.temp_providers||[];
  Object.values(CH).forEach(c=>c?.destroy()); CH={};

  document.getElementById('site-picker').style.display='none';
  document.getElementById('wrap').style.display='flex';

  const dd=document.getElementById('site-dropdown');
  if(S.sites.length>1){
    dd.style.display='';
    document.getElementById('site-btn-label').textContent=site.label;
    buildSiteMenu();
  }

  // Show gear icon for all sites with a configurable bridge
  const isBleSite=site.bridge==='ble'||site.bridge==='linux_ble';
  document.getElementById('settings-gear').style.display=isBleSite?'':'none';

function toggleSiteDropdown(){

// ── Poll ───────────────────────────────────────────────────────────────
async function poll(){
  if(!S.activeSite) return;
  try{
    const sq=`?site=${encodeURIComponent(S.activeSite)}`;
    const isBms=S.siteUi?.battery_display==='bms';
    const fetches=[
      fetch(`/api/v1/current${sq}`).then(r=>r.json()),
      fetch(`/api/v1/devices${sq}`).then(r=>r.json()),
    ];
    if(isBms) fetches.push(fetch(`/api/v1/battery${sq}`).then(r=>r.json()));

    const[cur,devs,batt]=await Promise.all(fetches);
    if(batt) S.battData=batt;

    if(devs.devices && devs.devices.length>0){
      for(const id in cur){
        if(!S.current[id]) S.current[id]=cur[id];
        else{
          S.current[id].ts=cur[id].ts;
          S.current[id].fields={...S.current[id].fields,...cur[id].fields};
        }
      }
      S.devices=devs.devices;
      S.bridge_online=devs.bridge_online;

      const bmsIds=new Set(Object.keys(S.battData));
      if(isBms){
        for(const d of S.devices){
          const f=S.current[d.id]?.fields||{};
          if('soc' in f && !('charge_state' in f)) bmsIds.add(d.id);
        }
      }
      S.bmsDevice=[...bmsIds][0]||null;

      const bsDevice=S.devices.find(d=>
        !bmsIds.has(d.id)&&(d.id.includes('sense')||d.label.toLowerCase().includes('sense'))
      );
      S.bsense=bsDevice?bsDevice.id:null;

      // AC chargers: have charge_state but no pv_power — not solar MPPTs
      const chargerIds=new Set();
      for(const d of S.devices){
        const f=S.current[d.id]?.fields||{};
        if('charge_state' in f && !('pv_power' in f) && !bmsIds.has(d.id)) chargerIds.add(d.id);
      }
      S.chargers=[...chargerIds].sort();

      S.mptts=S.devices
        .filter(d=>d.id!==S.bsense&&!bmsIds.has(d.id)&&!chargerIds.has(d.id))
        .map(d=>d.id).sort();
    }

    S.last=Date.now();
    buildTabDefs();
    render();
    if(!S.chartsLoaded&&S.tabDefs.length>0){ S.chartsLoaded=true; updateCharts(); }
  }catch(e){ console.error('Poll failed:',e); }
}

// ── Tab definitions ────────────────────────────────────────────────────
function buildTabDefs(){
  const defs=[];
  let mptts=S.mptts, bsense=S.bsense;

  if(mptts.length===0&&S.devices.length>0){
    const bmsIds=S.bmsDevice?new Set([S.bmsDevice]):new Set();
    const bsenseDevice=S.devices.find(d=>
      !bmsIds.has(d.id)&&S.current[d.id]&&
      'temperature' in (S.current[d.id].fields||{})&&
      !('charge_state' in (S.current[d.id].fields||{}))
    );
    if(bsenseDevice) bsense=bsenseDevice.id;
    mptts=S.devices.filter(d=>d.id!==(bsenseDevice?.id)&&!bmsIds.has(d.id)&&!S.chargers.includes(d.id)).map(d=>d.id);
  }

  mptts.forEach((id,i)=>{
    const label=S.current[id]?.label||S.devices.find(d=>d.id===id)?.label||id;
    defs.push({id,label,kind:'mppt',idx:i});
  });

  S.chargers.forEach(id=>{
    const label=S.current[id]?.label||S.devices.find(d=>d.id===id)?.label||id;
    defs.push({id,label,kind:'charger',idx:defs.length});
  });

  const battId=S.siteUi?.battery_display==='bms'
    ?(S.bmsDevice||'battery')
    :(bsense||(mptts.length>0?'battery':null));
  if(battId) defs.push({id:battId,label:'Battery',kind:'battery',idx:defs.length});
  defs.push({id:'insights',label:'Insights',kind:'insights',idx:defs.length});
  S.tabDefs=defs;

  const INSIGHTS_IDX=defs.findIndex(d=>d.kind==='insights');
  if(S.tab===3&&INSIGHTS_IDX>=0) S.tab=INSIGHTS_IDX;

  const bar=document.getElementById('tab-bar');
  const tabHtml=defs.map((d,i)=>
    `<button class="tab-btn${i===S.tab?' active':''}" onclick="switchTab(${i})">${d.label}</button>`
  ).join('');
  if(bar.innerHTML!==tabHtml) bar.innerHTML=tabHtml;

  const wrap=document.getElementById('panels');
  if(parseInt(wrap.dataset.count||0)!==defs.length){
    wrap.dataset.count=defs.length;
    wrap.innerHTML=defs.map((d,i)=>{
      const active=i===S.tab?'active':'';
      if(d.kind==='mppt') return `
        <div id="panel-${i}" class="chart-panel ${active}">
          <div class="chart-card"><div class="chart-title">Solar Power</div><div class="chart-container"><canvas id="chart-${i}-p"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">PV Voltage</div><div class="chart-container"><canvas id="chart-${i}-pv"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Charge Current</div><div class="chart-container"><canvas id="chart-${i}-c"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Battery Voltage</div><div class="chart-container"><canvas id="chart-${i}-v"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Load Power</div><div class="chart-container"><canvas id="chart-${i}-l"></canvas></div></div>
        </div>`;
      if(d.kind==='battery') return `
        <div id="panel-${i}" class="chart-panel ${active}">
          <div class="chart-card"><div class="chart-title">Battery Voltage - All Sources</div><div class="chart-container"><canvas id="chart-${i}-v"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Temperature</div><div class="chart-container"><canvas id="chart-${i}-t"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Total Charging Current</div><div class="chart-container"><canvas id="chart-${i}-c"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Total Charging Power</div><div class="chart-container"><canvas id="chart-${i}-p"></canvas></div></div>
        </div>`;
      if(d.kind==='charger') return `
        <div id="panel-${i}" class="chart-panel ${active}">
          <div class="chart-card"><div class="chart-title">Charge Current</div><div class="chart-container"><canvas id="chart-${i}-c"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Battery Voltage</div><div class="chart-container"><canvas id="chart-${i}-v"></canvas></div></div>
        </div>`;
      return `
        <div id="panel-${i}" class="chart-panel ${active}">
          <div class="chart-card"><div class="chart-title">Total Solar Output</div><div class="chart-container"><canvas id="chart-${i}-comb"></canvas></div></div>
          <div class="chart-card"><div class="chart-title">Daily Yield (Wh)</div><div class="chart-container"><canvas id="chart-${i}-bar"></canvas></div></div>
        </div>`;
    }).join('');
  }
}

// ── Render ─────────────────────────────────────────────────────────────
function render(){
  const bb=document.getElementById('bridge-banner');
  bb.classList.toggle('hidden',S.bridge_online!==false);
  const activeSiteObj=S.sites.find(s=>s.id===S.activeSite);
  bb.textContent=(activeSiteObj?.bridge==='esp32'||!activeSiteObj?.bridge)
    ?'Bridge Offline — check ESP32 connection'
    :'Bridge Offline — check ble-bridge container';
  renderFlow();
  renderCards();
  renderHeader();
}

function renderHeader(){
  document.getElementById('status-pills').innerHTML=S.devices.map(d=>
    `<div class="s-pill"><div class="s-dot ${d.online?'on':'off'}"></div>${d.label}</div>`
  ).join('');
  const ago=S.last?Math.round((Date.now()-S.last)/1000):0;
  document.getElementById('last-update').textContent=ago<2?'Live':`${ago}s ago`;
}

function renderFlow(){
  const key=S.mptts.join(',')+'\x01'+S.chargers.join(',');
  if(key!==_flowKey){ _flowKey=key; _buildFlowSvg(); }
  _updateFlowValues();
}

function _buildFlowSvg(){
  const el=document.getElementById('flow-svg'); if(!el) return;
  const N=S.mptts.length, M=S.chargers.length;

  // Fixed Y positions (match original design proportions)
  const PV_Y=12, MP_Y=112, BT_Y=248, SVG_H=350;
  const MW=160, MH=86, PH=68, BW=200, BH=84, CW=160, CH=84;
  const PAD=20, COL_SPAN=300; // 300px between MPPT centers → matches original 100/400 layout
  const BC_GAP=20; // gap between battery right and charger left

  // X layout: for N=1 center MPPT over battery; for N>=2 spread by COL_SPAN
  let mpptCX, BT_X, SVG_W_base;
  if(N<=1){
    BT_X=PAD;
    mpptCX=()=>PAD+BW/2; // MPPT centered over battery
    SVG_W_base=PAD+Math.max(MW,BW)+PAD;
  } else {
    mpptCX=i=>PAD+MW/2+i*COL_SPAN; // i=0 → 100, i=1 → 400 (same as original)
    const midCX=(mpptCX(0)+mpptCX(N-1))/2;
    BT_X=Math.round(midCX-BW/2);
    SVG_W_base=mpptCX(N-1)+MW/2+PAD;
  }

  const BT_LTERM=BT_X+14, BT_RTERM=BT_X+BW-14;
  const CH_X=BT_X+BW+BC_GAP;
  const SVG_W=M>0?Math.max(SVG_W_base,CH_X+CW+PAD):SVG_W_base;

  // Battery terminal connection X for MPPT i (spread across battery top)
  function battConnX(i){
    if(N<=1) return BT_X+BW/2;
    return Math.round(BT_X+22+i*(BW-44)/(N-1));
  }
  // Load node offset 46px gives circle left/right edge 30px inside SVG edge (10px clear of PAD=20)
  const LOAD_OFFSET=46, LOAD_R=24, LOAD_CY=BT_Y+38;
  function loadCircleCX(i){ return i===0?mpptCX(0)-LOAD_OFFSET:mpptCX(N-1)+LOAD_OFFSET; }

  let h=`<defs>
  <linearGradient id="g-batt-hi" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#3b82f6"/>
    <stop offset="60%" stop-color="#00f2ff"/>
    <stop offset="100%" stop-color="#10b981"/>
  </linearGradient>
  <linearGradient id="g-batt-lo" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ef4444"/>
    <stop offset="100%" stop-color="#f59e0b"/>
  </linearGradient>
  <filter id="glow" x="-50" y="-50" width="${SVG_W+200}" height="${SVG_H+100}" filterUnits="userSpaceOnUse">
    <feGaussianBlur stdDeviation="3.5" result="b"/>
    <feComposite in="SourceGraphic" in2="b" operator="over"/>
  </filter>
  <pattern id="solar-cell" x="0" y="0" width="26" height="22" patternUnits="userSpaceOnUse">
    <rect x="1" y="1" width="24" height="20" rx="2" fill="rgba(30,58,138,0.22)" stroke="rgba(255,204,51,0.35)" stroke-width="0.6"/>
    <line x1="12.5" y1="1" x2="12.5" y2="21" stroke="rgba(255,204,51,0.15)" stroke-width="0.5"/>
  </pattern>
  <clipPath id="batt-clip"><rect x="${BT_X+4}" y="${BT_Y+4}" width="${BW-8}" height="${BH-8}" rx="7"/></clipPath>
</defs>`;

  // PV panels + MPPT boxes + connecting paths
  for(let i=0;i<N;i++){
    const cx=mpptCX(i), pvX=cx-MW/2, bcx=battConnX(i);
    const lcx=loadCircleCX(i);
    const ldx=cx-lcx, ldy=(MP_Y+MH)-LOAD_CY;
    const lmag=Math.hypot(ldx,ldy)||1;
    const lepx=Math.round(lcx+LOAD_R*ldx/lmag);
    const lepy=Math.round(LOAD_CY+LOAD_R*ldy/lmag);
    h+=`
<rect id="pv${i+1}-box" class="nb" x="${pvX}" y="${PV_Y}" width="${MW}" height="${PH}" rx="12"/>
<rect x="${pvX+4}" y="${PV_Y+4}" width="${MW-8}" height="${PH-8}" rx="9" fill="url(#solar-cell)" opacity="0.9"/>
<line x1="${pvX+4}" y1="${PV_Y+25}" x2="${pvX+MW-4}" y2="${PV_Y+25}" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
<line x1="${pvX+4}" y1="${PV_Y+43}" x2="${pvX+MW-4}" y2="${PV_Y+43}" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
<line x1="${pvX+Math.round(MW/3)}" y1="${PV_Y+4}" x2="${pvX+Math.round(MW/3)}" y2="${PV_Y+PH-4}" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
<line x1="${pvX+Math.round(2*MW/3)}" y1="${PV_Y+4}" x2="${pvX+Math.round(2*MW/3)}" y2="${PV_Y+PH-4}" stroke="rgba(255,204,51,0.18)" stroke-width="1"/>
<text id="pv${i+1}-label" class="nl" x="${cx}" y="${PV_Y+17}" text-anchor="middle" style="font-size:9px">-</text>
<text class="nv" id="flow-pv${i+1}-volt" x="${cx}" y="${PV_Y+37}" text-anchor="middle" style="font-size:11px;opacity:0.75">-</text>
<text class="nv" id="flow-pv${i+1}-val" x="${cx}" y="${PV_Y+56}" text-anchor="middle" style="font-size:14px;font-weight:800">-</text>
<rect id="mppt${i+1}-box" class="nb" x="${pvX}" y="${MP_Y}" width="${MW}" height="${MH}" rx="20" style="cursor:pointer" onclick="switchTab(${i})"/>
<text id="mppt${i+1}-label" class="nl" x="${cx}" y="${MP_Y+22}" text-anchor="middle" style="cursor:pointer" onclick="switchTab(${i})">-</text>
<rect id="mppt${i+1}-status-bg" x="${cx-42}" y="${MP_Y+28}" width="84" height="18" rx="9" fill="#1f2937"/>
<text id="mppt${i+1}-status-txt" class="nl" x="${cx}" y="${MP_Y+41}" text-anchor="middle" style="fill:white;font-size:9px;cursor:pointer" onclick="switchTab(${i})">-</text>
<text class="nv nbig" id="mppt${i+1}-flow-val" x="${cx}" y="${MP_Y+72}" text-anchor="middle" style="cursor:pointer" onclick="switchTab(${i})">-</text>
<path id="path-pv${i+1}" class="fl" d="M${cx},${PV_Y+PH} L${cx},${MP_Y}"/>
<path id="path-mppt${i+1}" class="fl" d="M${cx},${MP_Y+MH} C${cx},${BT_Y-20} ${bcx},${BT_Y-20} ${bcx},${BT_Y-10}"/>
<g id="mppt${i+1}-load-grp" style="display:none">
  <circle class="nb" cx="${lcx}" cy="${LOAD_CY}" r="${LOAD_R}"/>
  <text id="mppt${i+1}-load-val" class="nv" x="${lcx}" y="${LOAD_CY+5}" text-anchor="middle" style="font-size:11px">-</text>
  <text class="nl" x="${lcx}" y="${LOAD_CY+22}" text-anchor="middle">Load</text>
</g>
<path id="path-mppt${i+1}-load" class="fl" d="M${cx},${MP_Y+MH} L${lepx},${lepy}" style="display:none"/>`;
  }

  // Battery node
  const battCx=BT_X+BW/2;
  const divs=[1,2].map(d=>`<line x1="${BT_X+Math.round(BW*d/3)}" y1="${BT_Y+4}" x2="${BT_X+Math.round(BW*d/3)}" y2="${BT_Y+BH-4}" stroke="var(--node-stroke)" stroke-width="1.5"/>`).join('');
  h+=`
<g onclick="switchTabByKind('battery')" style="cursor:pointer">
  <rect class="nb" x="${BT_X}" y="${BT_Y}" width="${BW}" height="${BH}" rx="10"/>
  ${divs}
  <rect x="${BT_LTERM-10}" y="${BT_Y-12}" width="20" height="12" rx="4" fill="var(--node-fill)" stroke="var(--node-stroke)" stroke-width="1.5"/>
  <text x="${BT_LTERM}" y="${BT_Y-2}" text-anchor="middle" style="fill:var(--sub);font-size:10px;font-weight:900">&minus;</text>
  <rect x="${BT_RTERM-10}" y="${BT_Y-12}" width="20" height="12" rx="4" fill="var(--node-fill)" stroke="var(--node-stroke)" stroke-width="1.5"/>
  <text x="${BT_RTERM}" y="${BT_Y-2}" text-anchor="middle" style="fill:#ef4444;font-size:10px;font-weight:900">+</text>
  <rect id="batt-fill-bar" x="${BT_X+4}" y="${BT_Y+4}" width="0" height="${BH-8}" fill="url(#g-batt-hi)" opacity="0.45" clip-path="url(#batt-clip)"/>
  <text class="nl" x="${battCx}" y="${BT_Y+18}" text-anchor="middle" style="font-size:9px;letter-spacing:0.5px">LiFePO4 &middot; Battery</text>
  <text class="nv" id="flow-batt-v" x="${battCx-30}" y="${BT_Y+52}" text-anchor="middle" style="font-size:19px;font-weight:800;fill:var(--batt)">-</text>
  <text id="flow-batt-soc" style="fill:var(--sub);font-size:12px;font-weight:700" x="${battCx+40}" y="${BT_Y+42}" text-anchor="middle">-</text>
  <text class="nv" id="flow-batt-t" x="${battCx+40}" y="${BT_Y+60}" text-anchor="middle" style="font-size:12px;fill:#9ca3af">-</text>
</g>`;

  // Charger nodes (stacked to the right of battery)
  for(let m=0;m<M;m++){
    const chY=BT_Y+m*(CH+10);
    const chCx=CH_X+CW/2;
    const arcY=BT_Y-32;
    const chId=S.chargers[m];
    h+=`
<g id="charger-grp-${m}" style="cursor:pointer" onclick="switchTabByKind('charger','${chId}')">
  <rect id="charger-box-${m}" class="nb" x="${CH_X}" y="${chY}" width="${CW}" height="${CH}" rx="20"/>
  <text x="${chCx}" y="${chY+19}" text-anchor="middle" style="fill:#60a5fa;font-size:7.5px;letter-spacing:0.8px;font-weight:700">AC ~</text>
  <text id="charger-label-${m}" class="nl" x="${chCx}" y="${chY+34}" text-anchor="middle">-</text>
  <rect id="charger-status-bg-${m}" x="${chCx-42}" y="${chY+38}" width="84" height="18" rx="9" fill="#1f2937"/>
  <text id="charger-status-txt-${m}" class="nl" x="${chCx}" y="${chY+51}" text-anchor="middle" style="fill:white;font-size:9px">-</text>
  <text class="nv nbig" id="charger-flow-val-${m}" x="${chCx}" y="${chY+74}" text-anchor="middle">-</text>
</g>
<path id="path-charger-${m}" class="fl" d="M${chCx},${chY} C${chCx},${arcY} ${BT_RTERM},${arcY} ${BT_RTERM},${BT_Y-10}"/>`;
  }

  el.innerHTML=h;
  el.setAttribute('viewBox',`0 0 ${SVG_W} ${SVG_H}`);
  void el.getBoundingClientRect(); // force synchronous layout so paths have non-zero bounding boxes
}

function _updateFlowValues(){
  const m0=S.current[S.mptts[0]], m1=S.current[S.mptts[1]];

  // MPPT panels + boxes + paths
  for(let i=0;i<S.mptts.length;i++){
    const id=S.mptts[i];
    const d=S.current[id];
    const lbl=d?.label||S.devices.find(x=>x.id===id)?.label||'-';
    const svgLbl=lbl.length>13?lbl.slice(0,12)+'…':lbl;
    setText(`pv${i+1}-label`,svgLbl);
    setText(`mppt${i+1}-label`,svgLbl);
    setPvNode(i+1,d);
    updateMpptNode(i+1,d);
    setLoadNode(i+1,d);
    const pv=pvWatts(d), cs=Math.round(d?.fields?.charge_state??0);
    updatePath(`path-pv${i+1}`,pv??0,'#f59e0b',40);
    updatePath(`path-mppt${i+1}`,d?.fields?.charge_current??0,STATES[cs]?.[1]||'#64748b',4);
  }

  // Battery
  if(S.siteUi?.battery_display==='bms'&&S.bmsDevice){
    const bmsF=S.battData[S.bmsDevice]?.fields||{};
    S.bvolt=bmsF.battery_voltage??m0?.fields?.battery_voltage??m1?.fields?.battery_voltage??null;
    S.bsoc=bmsF.soc??null;
    const charging=bmsF.battery_current!=null&&bmsF.battery_current>0.1;
    setText('flow-batt-v',S.bvolt!=null?S.bvolt.toFixed(2)+' V':'-');
    setText('flow-batt-soc',charging?'chg':(S.bsoc!=null?S.bsoc.toFixed(0)+'%':'-'));
    setText('flow-batt-t','');
    const bar=document.getElementById('batt-fill-bar');
    if(bar&&S.bsoc!=null){
      bar.setAttribute('width',String(S.bsoc/100*(192)));
      bar.setAttribute('fill',S.bsoc<20?'url(#g-batt-lo)':'url(#g-batt-hi)');
    }
  } else {
    const bs=S.bsense?S.current[S.bsense]:null;
    S.bvolt=bs?.fields?.battery_voltage??m0?.fields?.battery_voltage??m1?.fields?.battery_voltage??null;
    const charging=S.mptts.some(id=>{const cs=S.current[id]?.fields?.charge_state;return cs===3||cs===4;});
    S.bsoc=(S.bvolt!=null&&!charging)?lfp4Soc(S.bvolt):null;
    if(S.bvolt!=null){
      setText('flow-batt-v',S.bvolt.toFixed(2)+' V');
      setText('flow-batt-soc',charging?'chg':S.bsoc.toFixed(0)+'%');
      const bar=document.getElementById('batt-fill-bar');
      if(bar){bar.setAttribute('width',String(S.bsoc/100*192));bar.setAttribute('fill',S.bsoc<20?'url(#g-batt-lo)':'url(#g-batt-hi)');}
    } else {setText('flow-batt-v','-');setText('flow-batt-soc','-');}
    const temp=bs?.fields?.temperature??null;
    setText('flow-batt-t',temp!=null?temp.toFixed(1)+'°C':'');
  }

  // Charger nodes
  for(let m=0;m<S.chargers.length;m++){
    const id=S.chargers[m], cDev=S.current[id], cF=cDev?.fields||{};
    const cs=Math.round(cF.charge_state??0), st=STATES[cs]||STATES[0], cc=cF.charge_current??0;
    const cLbl=cDev?.label||S.devices.find(d=>d.id===id)?.label||id;
    setText(`charger-label-${m}`,cLbl.length>13?cLbl.slice(0,12)+'…':cLbl);
    const sTxt=document.getElementById(`charger-status-txt-${m}`);
    const sBg=document.getElementById(`charger-status-bg-${m}`);
    const cBox=document.getElementById(`charger-box-${m}`);
    if(sTxt){sTxt.textContent=st[0];sTxt.style.fill=st[1]==='#374151'?'#9ca3af':'white';}
    if(sBg) sBg.setAttribute('fill',st[1]+(isLight()?'66':'33'));
    if(cBox) cBox.style.stroke=cs>0?st[1]+'dd':'';
    setText(`charger-flow-val-${m}`,fv(cDev,'charge_current','A'));
    updatePath(`path-charger-${m}`,cc,'#60a5fa',10);
  }
}

function pvWatts(m){
  if(!m) return null;
  if(m.fields?.pv_power!=null) return m.fields.pv_power;
  if('charge_state' in (m.fields||{})) return 0;
  return null;
}

function setPvNode(idx,m){
  const w=pvWatts(m);
  setText(`flow-pv${idx}-val`,w!=null?fmtW(w):'-');
  const volt=m?.fields?.pv_voltage;
  setText(`flow-pv${idx}-volt`,volt!=null?volt.toFixed(1)+' V':'-');
  const box=document.getElementById(`pv${idx}-box`);
  if(box){
    box.style.stroke=(w!=null&&w>1)?'#d97706':'';
    box.style.filter=(w!=null&&w>1)?'url(#glow)':'';
  }
}

function setLoadNode(idx,m){
  const grp=document.getElementById(`mppt${idx}-load-grp`);
  const pth=document.getElementById(`path-mppt${idx}-load`);
  if(!grp) return;

  if(S.siteUi?.show_loads===false){
    grp.style.display='none';
    if(pth) pth.style.display='none';
    return;
  }

  const lp=m?.fields?.load_power??0;
  const hasField='load_power' in (m?.fields||{});
  if(!hasField){
    grp.style.display='none';
    if(pth) pth.style.display='none';
    return;
  }

  grp.style.display='';
  const circle=grp.querySelector('circle');
  const valEl=document.getElementById(`mppt${idx}-load-val`);

  if(lp>=1){
    if(circle) circle.style.opacity='';
    if(valEl)  valEl.style.fill='';
    setText(`mppt${idx}-load-val`,lp.toFixed(0)+' W');
    if(pth) pth.style.display='';
    updatePath(`path-mppt${idx}-load`,lp,'#dc2626',100);
  } else {
    if(circle) circle.style.opacity='0.4';
    if(valEl)  valEl.style.fill='var(--sub)';
    setText(`mppt${idx}-load-val`,'~0 W');
    if(pth){
      pth.style.display='';
      if(pth.classList.contains('fl-active')){
        pth.classList.remove('fl-active');
        pth.style.stroke=pth.style.filter=pth.style.animation='';
      }
    }
  }
}

function updateMpptNode(idx,d){
  const cs=Math.round(d?.fields?.charge_state??0);
  const st=STATES[cs]||STATES[0];
  const txt=document.getElementById(`mppt${idx}-status-txt`);
  const bg =document.getElementById(`mppt${idx}-status-bg`);
  const box=document.getElementById(`mppt${idx}-box`);
  if(txt){
    txt.textContent=st[0];
    if(isLight()){ txt.style.fill='#020617'; txt.style.fontWeight='800'; }
    else { txt.style.fill=st[1]==='#374151'?'#9ca3af':'white'; }
  }
  if(bg) bg.setAttribute('fill',st[1]+(isLight()?'66':'33'));
  if(box) box.style.stroke=st[0]!=='Sleep'?st[1]+'dd':'';
  const big=d?.fields?.charge_current!=null
    ?fv(d,'charge_current',' A')
    :fv(d,'battery_voltage',' V',2);
  setText(`mppt${idx}-flow-val`,big);
}

function updatePath(id,val,col,maxVal){
  const p=document.getElementById(id); if(!p) return;
  p.style.display='';
  if(val>0.01){
    const ratio=Math.min(val/maxVal,1);
    const dur=(Math.max(0.3,1.8-ratio*1.5)).toFixed(2);
    const anim=`dash ${dur}s linear infinite`;
    if(!p.classList.contains('fl-active')||p.style.stroke!==col||p.style.animation!==anim){
      p.classList.add('fl-active');
      p.style.stroke=col; p.style.filter='url(#glow)';
      p.style.animation=anim; p.style.strokeWidth='6';
    }
  } else if(p.classList.contains('fl-active')){
    p.classList.remove('fl-active');
    p.style.stroke=p.style.filter=p.style.animation=p.style.strokeWidth='';
  }
}

// ── Cards ──────────────────────────────────────────────────────────────
let _cardsKey='', _flowKey='';

function renderCards(){
  const cont=document.getElementById('cards');
  const isBmsSite=S.siteUi?.battery_display==='bms';
  const battId=isBmsSite?S.bmsDevice:S.bsense;
  const ids=[...S.mptts,...(battId?[battId]:[]),...S.chargers];

  const battKey=S.bmsDevice?JSON.stringify(S.battData[S.bmsDevice]?.fields||{}):'';
  const key=ids.map(id=>{
    const f=S.current[id]?.fields||{};
    return `${id}:${f.pv_power??''}:${f.pv_voltage??''}:${f.charge_state??''}:${f.charge_current??''}:${f.battery_voltage??''}:${f.yield_today??''}:${f.temperature??''}:${S.tab}`;
  }).join('|')+(S.bridge_online?'1':'0')+battKey;
  if(key===_cardsKey) return;
  _cardsKey=key;

  cont.innerHTML=ids.map(id=>{
    const d=S.current[id];
    const info=S.devices.find(x=>x.id===id);
    const isM=S.mptts.includes(id);
    const isBms=isBmsSite&&id===S.bmsDevice;
    const isCharger=S.chargers.includes(id);
    const tabIdx=isM?S.mptts.indexOf(id)
                :isCharger?S.tabDefs.findIndex(t=>t.kind==='charger'&&t.id===id)
                :S.tabDefs.findIndex(t=>t.kind==='battery');
    const isActive=S.tab===tabIdx;
    const accent=isM?'#ffcc33':isCharger?'#60a5fa':'var(--batt)';

    if(isM){
      const pvW=pvWatts(d);
      const hNum=pvW!=null?fmtW(pvW):'-';
      const hLbl=pvW==null&&(d?.fields?.charge_state??0)!==0?'Solar - not in current packet':'Solar Power';
      const bv=fv(d,'battery_voltage',' V',2);
      const cc=d?.fields?.charge_current!=null?d.fields.charge_current.toFixed(2)+' A':'-';
      const pvv=d?.fields?.pv_voltage!=null?d.fields.pv_voltage.toFixed(1)+' V':'-';
      const yt=fmtWh(d?.fields?.yield_today??null);
      const cs=Math.round(d?.fields?.charge_state??0);
      const stLbl=(STATES[cs]||STATES[0])[0];
      return `<div class="card${!info?.online?' s-silent':''}${isActive?' active-tab':''}"
                   onclick="switchTab(${tabIdx})" style="padding-top:22px">
        <div class="card-accent" style="background:${accent}"></div>
        <div class="c-label">${d?.label||id} <span style="font-weight:400;opacity:0.6;font-size:9px">${stLbl}</span></div>
        <div class="c-val-group"><span class="c-hero-num" style="color:${accent}">${hNum}</span></div>
        <div class="c-hero-label">${hLbl}</div>
        <div class="c-grid" style="grid-template-columns:repeat(2,1fr)">
          <div><div class="m-v">${bv}</div><div class="m-l">Battery V</div></div>
          <div><div class="m-v">${cc}</div><div class="m-l">Charge A</div></div>
          <div><div class="m-v">${pvv}</div><div class="m-l">PV Volt</div></div>
          <div><div class="m-v">${yt}</div><div class="m-l">Today</div></div>
        </div>
      </div>`;
    }

    if(isCharger){
      const cs=Math.round(d?.fields?.charge_state??-1);
      const stLbl=cs<0?'-':(STATES[cs]||STATES[0])[0];
      const stCol=cs===3||cs===4?'#f59e0b':cs===5?'#10b981':'#6b7280';
      const err=Math.round(d?.fields?.charger_error??0);
      const bv=d?.fields?.battery_voltage!=null?d.fields.battery_voltage.toFixed(2)+' V':'-';
      const cc=d?.fields?.charge_current!=null?d.fields.charge_current.toFixed(2)+' A':'-';
      return `<div class="card${!info?.online?' s-silent':''}${isActive?' active-tab':''}"
                   onclick="switchTab(${tabIdx})" style="padding-top:22px">
        <div class="card-accent" style="background:#60a5fa"></div>
        <div class="c-label">${d?.label||id}</div>
        <div class="c-val-group"><span class="c-hero-num" style="color:${stCol}">${stLbl}</span></div>
        <div class="c-hero-label">AC Charger · ${err?'Error '+err:'No errors'}</div>
        <div class="c-grid" style="grid-template-columns:repeat(2,1fr)">
          <div><div class="m-v">${bv}</div><div class="m-l">Battery V</div></div>
          <div><div class="m-v">${cc}</div><div class="m-l">Charge A</div></div>
        </div>
      </div>`;
    }

    if(isBms){
      const bmsData=S.battData[id]||{};
      const f=bmsData.fields||{};
      const soc=f.soc!=null?f.soc.toFixed(0):'-';
      const socPct=f.soc!=null?Math.max(0,Math.min(100,f.soc)):0;
      const bv=f.battery_voltage!=null?f.battery_voltage.toFixed(2)+' V':'-';
      const ba=f.battery_current!=null?f.battery_current.toFixed(1)+' A':'-';
      const cycles=f.cycles!=null?f.cycles.toFixed(0):'-';
      const delta=(f.cell_max!=null&&f.cell_min!=null)
        ?((f.cell_max-f.cell_min)*1000).toFixed(0)+' mV':'-';
      const btemp=f.temperature!=null?f.temperature.toFixed(1)+' °C':'-';
      const btemp2=f.temperature_mosfet!=null?f.temperature_mosfet.toFixed(1)+' °C':null;
      const rwh=f.remaining_wh!=null?Math.round(f.remaining_wh)+' Wh':null;
      const barCol=socPct<20?'var(--red)':socPct<50?'var(--amber)':'var(--charge)';
      return `<div class="card${!info?.online?' s-silent':''}${isActive?' active-tab':''}${S.mptts.length%2===0?' card-wide':''}"
                   onclick="switchTab(${tabIdx})" style="padding-top:22px">
        <div class="card-accent" style="background:var(--batt)"></div>
        <div class="c-label">${bmsData.label||'Battery'}</div>
        <div class="c-val-group">
          <span class="c-hero-num" style="color:var(--batt)">${soc}</span>
          <span class="c-hero-unit">%</span>
        </div>
        <div class="c-hero-label">State of Charge${rwh?` &nbsp;·&nbsp; <span style="color:var(--text)">${rwh}</span> left`:''}</div>
        <div class="soc-bar-track">
          <div class="soc-bar-fill" style="width:${socPct}%;background:${barCol}"></div>
        </div>
        <div class="c-grid" style="grid-template-columns:repeat(2,1fr)">
          <div><div class="m-v">${bv}</div><div class="m-l">Voltage</div></div>
          <div><div class="m-v">${ba}</div><div class="m-l">Current</div></div>
          <div><div class="m-v">${delta}</div><div class="m-l">Cell Delta</div></div>
          <div><div class="m-v">${btemp}</div><div class="m-l">Cell Temp</div></div>
          ${btemp2!=null?`<div><div class="m-v">${btemp2}</div><div class="m-l">MOSFET Temp</div></div>`:''}
          <div><div class="m-v">${cycles}</div><div class="m-l">Cycles</div></div>
        </div>
      </div>`;
    }

    const bvDisp=S.bvolt!=null?S.bvolt.toFixed(2):'-';
    const socDisp=S.bsoc!=null?S.bsoc.toFixed(0)+'%':'-';
    const tmpDisp=fv(d,'temperature','°C');
    const battSrc=d?.fields?.battery_voltage!=null?d.label
                 :S.mptts.length>0?(S.current[S.mptts[0]]?.label||'MPPT'):'-';
    return `<div class="card${!info?.online?' s-silent':''}${isActive?' active-tab':''}${S.mptts.length%2===0?' card-wide':''}"
                 onclick="switchTab(${tabIdx})" style="padding-top:22px">
      <div class="card-accent" style="background:${accent}"></div>
      <div class="c-label">${d?.label||id}</div>
      <div class="c-val-group">
        <span class="c-hero-num" style="color:${accent}">${bvDisp}</span>
        <span class="c-hero-unit">V</span>
      </div>
      <div class="c-hero-label">Battery Voltage${d?.fields?.battery_voltage==null?' (via '+battSrc+')':''}</div>
      <div class="c-grid">
        <div><div class="m-v">${tmpDisp}</div><div class="m-l">Temp</div></div>
        <div><div class="m-v">${socDisp}</div><div class="m-l">SOC</div></div>
        <div><div class="m-v">-</div><div class="m-l">-</div></div>
      </div>
    </div>`;
  }).join('');
}

// ── Tab / range switching ──────────────────────────────────────────────
function switchTab(idx){
  S.tab=idx;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.chart-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  renderCards();
  updateCharts();
  if(window.innerWidth<=768) document.body.classList.add('mobile-detail');
}

function closeMobileDetail(){ document.body.classList.remove('mobile-detail'); }

function switchTabByKind(kind,id){
  const idx=id?S.tabDefs.findIndex(t=>t.kind===kind&&t.id===id):S.tabDefs.findIndex(t=>t.kind===kind);
  if(idx>=0) switchTab(idx);
}

function switchRange(l){
  S.range=l;
  document.querySelectorAll('.r-btn').forEach(b=>b.classList.toggle('active',b.textContent===l));
  Object.values(CH).forEach(c=>c?.destroy()); CH={};
  updateCharts();
}

// ── Charts ─────────────────────────────────────────────────────────────
async function updateCharts(){
  if(!S.tabDefs.length) return;
  const def=S.tabDefs[S.tab]; if(!def) return;
  const rng=RANGES.find(r=>r.l===S.range);
  if(def.kind==='mppt'){
    const id=def.id;
    await drawLine(`chart-${S.tab}-p`, id,'pv_power',       rng.st,'#ffcc33',wTick);
    await drawLine(`chart-${S.tab}-pv`,id,'pv_voltage',     rng.st,'#a78bfa',' V');
    await drawLine(`chart-${S.tab}-c`, id,'charge_current', rng.st,'#10b981',' A');
    await drawLine(`chart-${S.tab}-v`, id,'battery_voltage',rng.st,'#00f2ff',' V');
    await drawLine(`chart-${S.tab}-l`, id,'load_power',     rng.st,'#f97316',wTick);
  } else if(def.kind==='battery'){
    const voltIds=[...(S.bsense?[S.bsense]:[]),...S.mptts];
    await drawMulti(`chart-${S.tab}-v`,voltIds,'battery_voltage',rng.st,' V');
    // Temperature: use declared providers; fall back to bsense for old sites without temp_providers.
    const tempIds=S.tempProviders.length>0?S.tempProviders.map(d=>d.id):(S.bsense?[S.bsense]:[]);
    if(tempIds.length>0) await drawMulti(`chart-${S.tab}-t`,tempIds,'temperature',rng.st,'°C');
    await drawSum(`chart-${S.tab}-c`,S.mptts,'charge_current',rng.st,' A','Total Charging Current','#10b981');
    await drawBatteryPower(`chart-${S.tab}-p`,S.mptts,rng.st,wTick,'Total Charging Power','#f59e0b');
  } else if(def.kind==='charger'){
    const id=def.id;
    await drawLine(`chart-${S.tab}-c`, id,'charge_current', rng.st,'#10b981',' A');
    await drawLine(`chart-${S.tab}-v`, id,'battery_voltage',rng.st,'#00f2ff',' V');
  } else {
    await drawSum(`chart-${S.tab}-comb`,S.mptts,'pv_power',rng.st,wTick,'Total Solar Output','#f59e0b');
    await drawDailyBar(`chart-${S.tab}-bar`);
  }
}

async function hFetch(dev,field,start,maxPts=500){
  const sq=S.activeSite?`&site=${encodeURIComponent(S.activeSite)}`:'';
  const r=await fetch(`/api/v1/history?device=${encodeURIComponent(dev)}&field=${field}&start=${start}&max_points=${maxPts}${sq}`);
  return r.json();
}

function grad(ctx2d,col){
  const g=ctx2d.createLinearGradient(0,0,0,210);
  g.addColorStop(0,col+'55'); g.addColorStop(1,col+'00'); return g;
}

const UNIT_FMT={
  ' V': v=>v.toFixed(2)+' V',
  ' A': v=>v.toFixed(2)+' A',
  '°C': v=>v.toFixed(1)+'°C',
};
function baseOpts(unit){
  const c=chartColors();
  const tickFn=typeof unit==='function'?unit:(UNIT_FMT[unit]||(v=>`${v}${unit}`));
  return{
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{display:false},
      tooltip:{callbacks:{label:ctx=>tickFn(ctx.parsed.y)}},
    },
    scales:{
      x:{type:'time',grid:{color:c.grid},ticks:{color:c.tick,font:{size:11},maxTicksLimit:8}},
      y:{grid:{color:c.grid},ticks:{color:c.tick,font:{size:11},maxTicksLimit:6,callback:tickFn},border:{dash:[4,4]}}
    }
  };
}

async function drawLine(cid,dev,field,start,col,unit){
  const res=await hFetch(dev,field,start);
  const canvas=document.getElementById(cid); if(!canvas) return;
  if(CH[cid]) CH[cid].destroy();
  const ctx=canvas.getContext('2d');
  CH[cid]=new Chart(canvas,{
    type:'line',
    data:{datasets:[{data:(res.points||[]).map(p=>({x:p.t,y:p.v})),
      borderColor:col, backgroundColor:grad(ctx,col), fill:true,
      borderWidth:2, pointRadius:0, tension:0.3}]},
    options:baseOpts(unit)
  });
}

async function drawMulti(cid,ids,field,start,unit){
  const canvas=document.getElementById(cid); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const COLS=['#00f2ff','#ffcc33','#10b981','#a78bfa'];
  const datasets=await Promise.all(ids.map(async(id,i)=>{
    const res=await hFetch(id,field,start);
    const col=COLS[i%COLS.length];
    return{label:S.current[id]?.label||id,
      data:(res.points||[]).map(p=>({x:p.t,y:p.v})),
      borderColor:col, backgroundColor:i===0?grad(ctx,col):'transparent',
      fill:i===0, borderWidth:2, pointRadius:0, tension:0.3};
  }));
  if(CH[cid]) CH[cid].destroy();
  const c=chartColors();
  CH[cid]=new Chart(canvas,{
    type:'line', data:{datasets},
    options:{...baseOpts(unit),
      plugins:{...baseOpts(unit).plugins,legend:{display:true,labels:{color:c.leg,font:{size:11},boxWidth:12}}}}
  });
}

async function drawSum(cid,ids,field,start,unit,label,col){
  const canvas=document.getElementById(cid); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const results=await Promise.all(ids.map(id=>hFetch(id,field,start)));
  const sumMap={};
  results.forEach(res=>{
    (res.points||[]).forEach(p=>{ sumMap[p.t]=(sumMap[p.t]||0)+p.v; });
  });
  const data=Object.keys(sumMap).sort().map(t=>({x:t,y:sumMap[t]}));
  if(CH[cid]) CH[cid].destroy();
  CH[cid]=new Chart(canvas,{
    type:'line',
    data:{datasets:[{label,data,borderColor:col,backgroundColor:grad(ctx,col),fill:true,borderWidth:2,pointRadius:0,tension:0.3}]},
    options:baseOpts(unit)
  });
}

async function drawBatteryPower(cid,ids,start,unit,label,col){
  const canvas=document.getElementById(cid); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const[currentResults,voltageRes]=await Promise.all([
    Promise.all(ids.map(id=>hFetch(id,'charge_current',start))),
    hFetch(S.bsense||ids[0],'battery_voltage',start)
  ]);
  const vMap={};
  (voltageRes.points||[]).forEach(p=>{ vMap[p.t]=p.v; });
  const sumMap={};
  currentResults.forEach(res=>{
    (res.points||[]).forEach(p=>{
      const v=vMap[p.t]||0;
      if(v>0) sumMap[p.t]=(sumMap[p.t]||0)+(p.v*v);
    });
  });
  const data=Object.keys(sumMap).sort().map(t=>({x:t,y:Math.round(sumMap[t])}));
  if(CH[cid]) CH[cid].destroy();
  CH[cid]=new Chart(canvas,{
    type:'line',
    data:{datasets:[{label,data,borderColor:col,backgroundColor:grad(ctx,col),fill:true,borderWidth:2,pointRadius:0,tension:0.3}]},
    options:baseOpts(unit)
  });
}

const RANGE_DAYS={'1h':1,'6h':1,'24h':1,'7d':7,'30d':30,'All':365};
let _dailyCache={};

async function drawDailyBar(cid){
  const days=RANGE_DAYS[S.range]??30;
  const todayOnly=days===1;
  const tzOff=-(new Date().getTimezoneOffset())/60;
  const cacheKey=todayOnly?`today_${tzOff}_${S.activeSite}`:`${days}_${S.activeSite}`;
  const now=Date.now();
  let res;
  const cached=_dailyCache[cacheKey];
  if(cached&&now-cached.ts<5*60*1000){
    res=cached.result;
  } else {
    const sq=S.activeSite?`&site=${encodeURIComponent(S.activeSite)}`:'';
    const url=todayOnly
      ?`/api/v1/daily?days=1&today_only=true&tz_offset=${tzOff}${sq}`
      :`/api/v1/daily?days=${days}&tz_offset=${tzOff}${sq}`;
    res=await fetch(url).then(r=>r.json());
    _dailyCache[cacheKey]={result:res,ts:now};
  }
  const canvas=document.getElementById(cid); if(!canvas) return;
  const titleEl=canvas.closest('.chart-card')?.querySelector('.chart-title');
  if(titleEl) titleEl.textContent=days===1?'Today\'s Yield (Wh)':`${days}-Day Yield (Wh)`;
  if(CH[cid]) CH[cid].destroy();
  const c=chartColors();
  const COLS=['rgba(255,204,51,0.75)','rgba(16,185,129,0.75)'];
  CH[cid]=new Chart(canvas,{
    type:'bar',
    data:{
      labels:res.days.map(d=>d.date),
      datasets:S.mptts.map((id,i)=>({
        label:S.current[id]?.label||id,
        data:res.days.map(d=>(d.devices[id]||0)),
        backgroundColor:COLS[i%2], borderRadius:4
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{color:c.leg,font:{size:11},boxWidth:12}}},
      scales:{
        x:{stacked:true,grid:{color:c.grid},ticks:{color:c.tick,font:{size:11}}},
        y:{stacked:true,grid:{color:c.grid},ticks:{color:c.tick,font:{size:11},callback:whTick}}
      }
    }
  });
}

// ── Settings panel ─────────────────────────────────────────────────────
var _spScanState = null;  // null | 'scanning' | 'done' | 'error'
var _spScanResults = [];
var _spBleOnly = false;
var _spVictronScanState = null;  // null | 'scanning' | 'done' | 'error'
var _spVictronResults = [];
var _spSelectedVictron = null;   // {mac, name} once user picks one
var _spShowMpptForm = false;     // true when entering manually (no scan)

function openSettings(){
  if(!S.activeSite) return;
  const site=S.sites.find(s=>s.id===S.activeSite)||{};
  _spBleOnly = site.bridge==='ble' || site.bridge==='linux_ble';
  _spScanState=null; _spScanResults=[];
  _spVictronScanState=null; _spVictronResults=[]; _spSelectedVictron=null; _spShowMpptForm=false;
  document.getElementById('settings-overlay').classList.remove('hidden');
  renderSettingsPanel();
}

function closeSettings(){
  document.getElementById('settings-overlay').classList.add('hidden');
}

function renderSettingsPanel(){
  const site=S.sites.find(s=>s.id===S.activeSite)||{id:S.activeSite,label:S.activeSite};
  const scroll=document.getElementById('sp-scroll');
  const devices=S.devices||[];

  let html=`<div class="sp-section">
    <div class="sp-section-title">Devices — ${site.label||site.id}</div>`;

  if(devices.length===0){
    html+=`<div style="color:var(--sub);font-size:13px;padding:8px 0">No devices online yet.</div>`;
  } else {
    devices.forEach(d=>{
      const f=S.current[d.id]?.fields||{};
      const isBms='soc' in f && !('charge_state' in f);
      const sub=isBms
        ?`BMS · SOC ${f.soc!=null?f.soc.toFixed(0):'-'}%`
        :`MPPT · ${f.pv_power!=null?fmtW(f.pv_power):'-'}`;
      html+=`<div class="sp-device-row">
        <div class="sp-device-info">
          <div class="sp-device-name">${d.label||d.id}</div>
          <div class="sp-device-sub">${sub} &nbsp;·&nbsp; id: ${d.id}</div>
        </div>
        <button class="sp-remove-btn" onclick="confirmRemoveDevice('${d.id}','${(d.label||d.id).replace(/'/g,"\\'")}')">Remove</button>
      </div>`;
    });
  }
  html+=`</div>`;

  // Add BMS (BLE only)
  if(_spBleOnly){
    html+=`<div class="sp-section">
      <div class="sp-section-title">Add Battery (BMS)</div>`;
    if(_spScanState===null){
      html+=`<button class="sp-add-btn" onclick="startBmsScan()">
        <div class="sp-add-icon">&#9889;</div> Scan for BMS devices (~30 s)
      </button>`;
    } else if(_spScanState==='scanning'){
      html+=`<div class="sp-scan-loading">
        <div class="sp-spinner"></div> Scanning for BMS devices…
      </div>`;
    } else if(_spScanState==='error'){
      html+=`<div style="color:var(--red);font-size:13px;padding:8px 0">Scan failed. Check that the BMS is powered on and not already connected.</div>
      <button class="sp-add-btn" onclick="startBmsScan()">
        <div class="sp-add-icon">&#9889;</div> Retry scan
      </button>`;
    } else if(_spScanResults.length===0){
      html+=`<div style="color:var(--sub);font-size:13px;padding:8px 0">No BMS found. Make sure it is powered on and not connected to another device.</div>
      <button class="sp-add-btn" onclick="startBmsScan()">
        <div class="sp-add-icon">&#9889;</div> Scan again
      </button>`;
    } else {
      html+=`<div class="sp-scan-area">`;
      _spScanResults.forEach((r,i)=>{
        const alreadyAdded=S.devices.some(d=>{
          const f=S.current[d.id]?.fields||{};
          return 'soc' in f && !('charge_state' in f);
        });
        html+=`<div class="sp-scan-result">
          <div class="sp-scan-mac">${r.mac}</div>
          <div class="sp-scan-vals">
            <div class="sp-scan-val"><div class="sp-scan-num" style="color:var(--charge)">${r.soc!=null?r.soc.toFixed(0):'-'}%</div><div class="sp-scan-lbl">SOC</div></div>
            <div class="sp-scan-val"><div class="sp-scan-num" style="color:var(--batt)">${r.voltage!=null?r.voltage.toFixed(2):'-'} V</div><div class="sp-scan-lbl">Voltage</div></div>
            <div class="sp-scan-val"><div class="sp-scan-num">${r.temp!=null?r.temp.toFixed(0):'-'} °C</div><div class="sp-scan-lbl">Temp</div></div>
          </div>
          <button class="sp-scan-add" onclick="addBmsFromScan(${i})">Add this battery</button>
        </div>`;
      });
      html+=`</div>
      <button class="sp-add-btn" onclick="startBmsScan()" style="margin-top:4px">
        <div class="sp-add-icon">&#9889;</div> Scan again
      </button>`;
    }
    html+=`</div>`;
  }

  // Add MPPT section
  html+=`<div class="sp-section">
    <div class="sp-section-title">Add MPPT / Victron Device</div>`;
  if(!_spVictronScanState && !_spShowMpptForm){
    // Initial state — offer scan or manual entry
    html+=`<button class="sp-add-btn" onclick="startVictronScan()">
      <div class="sp-add-icon" style="color:var(--solar);background:rgba(255,204,51,0.15)">&#9711;</div> Scan for Victron devices (~10 s)
    </button>
    <button class="sp-add-btn" style="margin-top:6px" onclick="_spShowMpptForm=true;renderSettingsPanel()">
      <div class="sp-add-icon" style="color:var(--text-muted);background:var(--surf-2)">&#9998;</div> Enter MAC manually
    </button>`;
  } else if(_spVictronScanState==='scanning'){
    html+=`<div style="padding:16px 0;text-align:center;color:var(--text-muted)">Scanning&#8230;</div>`;
  } else if(_spVictronScanState==='error'){
    html+=`<div style="padding:8px 0;color:#f87171">Scan failed.</div>
    <button class="sp-add-btn" onclick="startVictronScan()">
      <div class="sp-add-icon" style="color:var(--solar);background:rgba(255,204,51,0.15)">&#9711;</div> Retry scan
    </button>`;
  } else if(_spVictronScanState==='done' && !_spSelectedVictron){
    // Show found devices
    if(_spVictronResults.length===0){
      html+=`<div style="padding:8px 0;color:var(--text-muted);font-size:13px">No unconfigured Victron devices found.</div>`;
    } else {
      _spVictronResults.forEach((d,i)=>{
        html+=`<button class="sp-add-btn" onclick="selectVictronDevice(${i})" style="margin-top:4px">
          <div class="sp-add-icon" style="color:var(--solar);background:rgba(255,204,51,0.15)">&#9711;</div>
          <div style="text-align:left">
            <div style="font-weight:600">${d.name}</div>
            <div style="font-size:11px;color:var(--text-muted)">${d.mac} &nbsp;·&nbsp; ${d.rssi} dBm</div>
          </div>
        </button>`;
      });
    }
    html+=`<button class="sp-add-btn" onclick="startVictronScan()" style="margin-top:8px">
      <div class="sp-add-icon" style="color:var(--text-muted);background:var(--surf-2)">&#8635;</div> Scan again
    </button>`;
  }
  // Form: shown when device selected from scan OR manual entry
  if(_spSelectedVictron || _spShowMpptForm){
    const preMac = _spSelectedVictron ? _spSelectedVictron.mac : '';
    const preName = _spSelectedVictron ? _spSelectedVictron.name : '';
    html+=`<div class="sp-form" style="margin-top:8px">
      <div class="sp-field">
        <label>Device ID <span style="font-weight:400;color:var(--text-muted);font-size:11px">(letters, numbers, _ -)</span></label>
        <input id="sp-mppt-id" placeholder="e.g. ip22_charger"
          oninput="document.getElementById('sp-mppt-id-err').textContent=/^[a-zA-Z0-9_-]{1,64}$/.test(this.value.trim())||!this.value?'':'Invalid — use only letters, numbers, _ or -'" />
        <span id="sp-mppt-id-err" style="color:#f87171;font-size:11px;margin-top:2px;display:block"></span>
      </div>
      <div class="sp-field">
        <label>Label</label>
        <input id="sp-mppt-label" value="${preName}" placeholder="e.g. IP22 Charger" />
      </div>
      <div class="sp-field">
        <label>MAC address</label>
        <input id="sp-mppt-mac" value="${preMac}" placeholder="XX:XX:XX:XX:XX:XX" ${preMac?'readonly style="opacity:0.6"':''}
          oninput="document.getElementById('sp-mppt-mac-err').textContent=/^[A-Fa-f0-9:]{17}$/.test(this.value.trim())||!this.value?'':'Format must be XX:XX:XX:XX:XX:XX'" />
        <span id="sp-mppt-mac-err" style="color:#f87171;font-size:11px;margin-top:2px;display:block"></span>
      </div>
      <div class="sp-field">
        <label>BLE encryption key <span style="font-weight:400;color:var(--text-muted);font-size:11px">(32 hex chars)</span></label>
        <input id="sp-mppt-key" placeholder="VictronConnect → Product Info → eye icon"
          oninput="document.getElementById('sp-mppt-key-err').textContent=/^[0-9a-fA-F]{32}$/.test(this.value.trim())||!this.value?'':'Must be exactly 32 hex characters'" />
        <span id="sp-mppt-key-err" style="color:#f87171;font-size:11px;margin-top:2px;display:block"></span>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="sp-submit" onclick="submitAddMppt()">Save device</button>
        <button class="sp-submit" style="background:var(--surf-2);color:var(--text)" onclick="_spSelectedVictron=null;_spShowMpptForm=false;renderSettingsPanel()">Cancel</button>
      </div>
    </div>`;
  }
  html+=`</div>`;

  scroll.innerHTML=html;
}

async function startBmsScan(){
  _spScanState='scanning'; _spScanResults=[];
  renderSettingsPanel();
  try{
    const sq=`?site=${encodeURIComponent(S.activeSite)}`;
    const res=await fetch(`/api/v1/scan/bms${sq}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    _spScanResults=await res.json();
    _spScanState='done';
  }catch(e){
    console.error('BMS scan failed:',e);
    _spScanState='error';
  }
  renderSettingsPanel();
}

async function startVictronScan(){
  _spVictronScanState='scanning'; _spVictronResults=[]; _spSelectedVictron=null; _spShowMpptForm=false;
  renderSettingsPanel();
  try{
    const sq=`?site=${encodeURIComponent(S.activeSite)}`;
    const res=await fetch(`/api/v1/scan/victron${sq}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    _spVictronResults=await res.json();
    _spVictronScanState='done';
  }catch(e){
    console.error('Victron scan failed:',e);
    _spVictronScanState='error';
  }
  renderSettingsPanel();
}

function selectVictronDevice(idx){
  _spSelectedVictron=_spVictronResults[idx]||null;
  renderSettingsPanel();
}

async function addBmsFromScan(idx){
  const r=_spScanResults[idx];
  if(!r) return;
  const id='bms_'+(r.mac||'').replace(/:/g,'').toLowerCase().slice(-6);
  const label='Battery';
  try{
    const resp=await fetch(`/api/v1/sites/${encodeURIComponent(S.activeSite)}/devices`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id,label,type:'litime_bms',mac:r.mac,
        write_uuid:r.write_uuid,notify_uuid:r.notify_uuid})
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      alert('Error: '+(err.detail||resp.statusText));
      return;
    }
    _spScanResults.splice(idx,1);
    _spScanState=_spScanResults.length>0?'done':null;
    renderSettingsPanel();
    poll();  // refresh dashboard data
  }catch(e){ alert('Network error: '+e); }
}

async function submitAddMppt(){
  const id   =document.getElementById('sp-mppt-id')?.value.trim();
  const label=document.getElementById('sp-mppt-label')?.value.trim();
  const mac  =(_spSelectedVictron?.mac || document.getElementById('sp-mppt-mac')?.value.trim()).toUpperCase();
  const key  =document.getElementById('sp-mppt-key')?.value.trim();
  if(!id||!label||!mac||!key){ alert('All fields are required.'); return; }
  if(!/^[A-F0-9:]{17}$/.test(mac)){ alert('MAC address must be in format XX:XX:XX:XX:XX:XX'); return; }
  if(!/^[0-9a-fA-F]{32}$/.test(key)){ alert('BLE key must be 32 hex characters'); return; }
  try{
    const resp=await fetch(`/api/v1/sites/${encodeURIComponent(S.activeSite)}/devices`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id,label,type:'victron_smartsolar',mac,key})
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      alert('Error: '+(err.detail||resp.statusText));
      return;
    }
    _spVictronScanState=null; _spVictronResults=[]; _spSelectedVictron=null; _spShowMpptForm=false;
    renderSettingsPanel();
    poll();
  }catch(e){ alert('Network error: '+e); }
}

function confirmRemoveDevice(id,label){
  document.getElementById('sp-confirm-title').textContent='Remove '+label+'?';
  document.getElementById('sp-confirm-msg').textContent=
    'This will remove "'+label+'" from the site configuration and stop data collection for this device. This cannot be undone from the dashboard.';
  const ok=document.getElementById('sp-confirm-ok');
  ok.onclick=()=>doRemoveDevice(id);
  document.getElementById('sp-confirm-overlay').classList.remove('hidden');
}

function closeConfirm(){
  document.getElementById('sp-confirm-overlay').classList.add('hidden');
}

async function doRemoveDevice(id){
  closeConfirm();
  try{
    const resp=await fetch(
      `/api/v1/sites/${encodeURIComponent(S.activeSite)}/devices/${encodeURIComponent(id)}`,
      {method:'DELETE'}
    );
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      alert('Error: '+(err.detail||resp.statusText));
      return;
    }
    renderSettingsPanel();
    poll();
  }catch(e){ alert('Network error: '+e); }
}

// ── Init ───────────────────────────────────────────────────────────────
(function(){
  const rb=document.getElementById('range-bar');
  RANGES.forEach(r=>{
    const b=document.createElement('button');
    b.className=`r-btn ${r.l===S.range?'active':''}`;
    b.textContent=r.l;
    b.onclick=()=>switchRange(r.l);
    rb.appendChild(b);
  });

  const h=new Date().getHours();
  setTheme(h>=7&&h<20?'light':'dark');

  document.addEventListener('click',function(e){
    const dd=document.getElementById('site-dropdown');
    if(dd&&!dd.contains(e.target)) closeSiteDropdown();
  });

  initSites();
})();
</script>
