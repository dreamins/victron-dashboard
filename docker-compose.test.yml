name: victron

services:
  mosquitto:
    environment:
      - MQTT_ESP32_PASS=test_esp32_pass
      - MQTT_DECODER_PASS=test_decoder_pass

  ble-decoder:
    volumes:
      - ./decoder/fixtures/devices_fixture.json:/app/devices.json:ro
      - ./decoder/fixtures:/app/fixtures:ro
    environment:
      - MQTT_PASSWORD=test_decoder_pass
      - INFLUX_BUCKET=victron_test

  solar-api:
    ports:
      - "8081:8080"
    environment:
      - INFLUX_BUCKET=victron_test
      - INFLUX_BUCKET_MEDIUM=victron_test
      - INFLUX_BUCKET_HOURLY=victron_test
