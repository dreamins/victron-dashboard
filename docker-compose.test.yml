name: victron

services:
  mosquitto:
    environment:
      - MQTT_ESP32_PASS=test_esp32_pass
      - MQTT_DECODER_PASS=test_decoder_pass

  ble-decoder:
    volumes:
      - ./decoder/fixtures/sites_fixture.json:/app/sites.json:ro
      - ./decoder/fixtures:/app/fixtures:ro
    environment:
      - MQTT_PASSWORD=test_decoder_pass
      - INFLUX_BUCKET=victron_test
      - SITES_FILE=/app/sites.json

  solar-api:
    ports:
      - "8081:8080"
    volumes:
      - ./api/tests/sites_fixture.json:/app/sites_fixture.json:ro
    environment:
      - INFLUX_BUCKET=victron_test
      - INFLUX_BUCKET_MEDIUM=victron_test
      - INFLUX_BUCKET_HOURLY=victron_test
      - SITES_FILE=/app/sites_fixture.json
