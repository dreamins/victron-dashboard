substitutions:
  name: victron-bridge

esphome:
  name: ${name}
  friendly_name: Victron Bridge

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

logger:
  level: INFO

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "${name}-fallback"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80

mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  birth_message:
    topic: victron/bridge/status
    payload: online
    retain: true
  will_message:
    topic: victron/bridge/status
    payload: offline
    retain: true

# 50% BLE duty cycle — time-slices the single 2.4 GHz antenna between WiFi and BLE.
# interval=320ms, window=160ms gives 50% duty. Victron devices broadcast ~1/s so nothing is missed.
esp32_ble_tracker:
  scan_parameters:
    duration: 10s
    interval: 320ms
    window: 160ms
    active: false
  on_ble_advertise:
    then:
      - lambda: |-
          for (auto &mf : x.get_manufacturer_datas()) {
            if (mf.uuid == esp32_ble::ESPBTUUID::from_uint16(0x02E1)) {
              std::string mac = x.address_str();
              std::string hex;
              char buf[3];
              for (uint8_t b : mf.data) {
                snprintf(buf, sizeof(buf), "%02x", b);
                hex += buf;
              }
              std::string payload = "{\"mac\":\"" + mac + "\",\"data\":\"" + hex + "\"}";
              id(mqtt_client).publish("victron/raw", payload);
              break;
            }
          }

sensor:
  - platform: wifi_signal
    name: "Bridge WiFi Signal"
    update_interval: 60s
    on_value:
      then:
        - mqtt.publish:
            topic: victron/bridge/rssi
            payload: !lambda 'return str_sprintf("%.1f", x);'
