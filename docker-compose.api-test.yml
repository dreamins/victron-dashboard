name: victron-api-test

# Standalone compose for API tests — no external ports, no production dependency.
# Uses isolated volumes and test credentials. Run via test_phase10.sh.

services:
  influxdb:
    image: influxdb:2.7
    volumes:
      - api-test-influxdb-data:/var/lib/influxdb2
      - api-test-influxdb-config:/etc/influxdb2
      - ./influxdb/init:/docker-entrypoint-initdb.d:ro
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=test_influx_admin_pass
      - DOCKER_INFLUXDB_INIT_ORG=home
      - DOCKER_INFLUXDB_INIT_BUCKET=victron
      - DOCKER_INFLUXDB_INIT_RETENTION=720h
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=test_influx_token_aabbccdd1122
    restart: "no"

  solar-api:
    build: ./api
    depends_on:
      - influxdb
    # No external ports — all test interaction via exec inside the container.
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=test_influx_token_aabbccdd1122
      - INFLUX_ORG=home
      - INFLUX_BUCKET=victron_test
      - INFLUX_BUCKET_MEDIUM=victron_test
      - INFLUX_BUCKET_HOURLY=victron_test
      - SITES_FILE=/app/sites_fixture.json
    volumes:
      - ./api/tests/sites_fixture.json:/app/sites_fixture.json:ro
    restart: "no"

volumes:
  api-test-influxdb-data:
  api-test-influxdb-config:
